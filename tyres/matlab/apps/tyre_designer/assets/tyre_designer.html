      const key = materialSeriesVisibilityKey(chartKey, seriesKey);
      return key ? materialHiddenSeries.has(key) : false;
    }

    function materialRowsForNode(nodeIndex) {
      return materialRowsForNodes([nodeIndex]);
    }

    function materialRowsForNodes(nodeIndices) {
      const selected = new Set((nodeIndices || []).map(Number).filter(Number.isFinite));
      return sortMaterialRows((state?.plotData?.materials || [])
        .filter(row => selected.has(Number(row.nodeIndex))));
    }

    function sortMaterialRows(rows) {
      return rows.slice().sort((a, b) =>
        materialKindOrder(a.kind) - materialKindOrder(b.kind)
        || Number(a.materialIndex) - Number(b.materialIndex)
        || Number(a.temperatureK) - Number(b.temperatureK)
        || String(a.kind || "").localeCompare(String(b.kind || "")));
    }

    function materialKindOrder(kind) {
      const key = String(kind || "");
      if (key === "TreadMaterial") return 0;
      if (key === "BulkMaterial") return 1;
      if (key === "PlyMaterial") return 2;
      return 9;
    }

    function materialKindLabel(kind) {
      const key = String(kind || "");
      if (key === "TreadMaterial") return "Tread";
      if (key === "BulkMaterial") return "Bulk";
      if (key === "PlyMaterial") return "Ply";
      return key || "Material";
    }

    function materialKindShort(kind) {
      const key = String(kind || "");
      if (key === "TreadMaterial") return "T";
      if (key === "BulkMaterial") return "B";
      if (key === "PlyMaterial") return "P";
      return key ? key.slice(0, 1).toUpperCase() : "M";
    }

    function materialKindColor(kind) {
      const key = String(kind || "");
      if (key === "TreadMaterial") return "#f0b85a";
      if (key === "BulkMaterial") return "#78d3ff";
      if (key === "PlyMaterial") return "#b99cff";
      return "#dce6ef";
    }

    function materialKindDash(kind) {
      const key = String(kind || "");
      if (key === "BulkMaterial") return "4 2";
      if (key === "PlyMaterial") return "2 2";
      return "";
    }

    function nodeSeriesColor(nodeIndex, selectedNodes, kind) {
      const nodes = (selectedNodes || []).map(Number).filter(Number.isFinite);
      if (nodes.length <= 1) return materialKindColor(kind);
      const index = Math.max(0, nodes.indexOf(Number(nodeIndex)));
      return COLORS[index % COLORS.length];
    }

    function temperatureC(row) {
      const value = Number(row?.temperatureK);
      return Number.isFinite(value) ? value - 273.15 : NaN;
    }

    function materialPressureFields(rows) {
      const fields = new Set();
      rows.forEach(row => {
        Object.keys(row || {}).forEach(key => {
          const lowered = key.toLowerCase();
          const pressureLike = lowered.includes("pressure") || lowered.includes("druck") || lowered.includes("kpa") || lowered.includes("bar");
          if (pressureLike && Number.isFinite(Number(row[key]))) fields.add(key);
        });
      });
      return Array.from(fields);
    }

    function drawMaterialSummary(element, rows) {
      const groups = ["TreadMaterial", "BulkMaterial", "PlyMaterial"].map(kind => ({
        kind,
        rows: rows.filter(row => String(row.kind || "") === kind)
      }));
      element.innerHTML = groups.map(group => {
        const active = materialKindFilters.has(group.kind);
        const activeClass = active ? "active" : "inactive";
        const pressed = active ? "true" : "false";
        return `<button type="button" class="material-chip ${activeClass}" data-material-kind-filter="${escapeAttr(group.kind)}" aria-pressed="${pressed}"><div class="name">${escapeHtml(materialKindLabel(group.kind))}</div></button>`;
      }).join("");
    }

    function drawMaterialRecognition(element, selectedNodes) {
      if (!element) return;
      const recognition = materialRecognitionData();
      const kinds = ["TreadMaterial", "BulkMaterial", "PlyMaterial"];
      if (!recognition.available) {
        element.innerHTML = kinds.map(kind => `<div class="material-match-chip"><span class="kind">${escapeHtml(materialKindLabel(kind))}</span><span class="name">-</span><span class="meta">not matched</span></div>`).join("");
        return;
      }

      const selectedSet = new Set((selectedNodes || []).map(Number).filter(Number.isFinite));
      const selectedMatches = recognition.localMatches.filter(match => selectedSet.has(Number(match.nodeIndex)) && match.best);
      element.innerHTML = kinds.map(kind => {
        const aggregate = aggregateSelectedMaterialMatches(selectedMatches.filter(match => match.kind === kind));
        if (!aggregate) {
          return `<div class="material-match-chip"><span class="kind">${escapeHtml(materialKindLabel(kind))}</span><span class="name">-</span><span class="meta">no rows</span></div>`;
        }
        const confidence = Math.round(clamp(aggregate.confidence, 0, 1) * 100);
        const eText = materialMultiplierRangeText(aggregate.modulusMultipliers, "E");
        const dText = materialMultiplierRangeText(aggregate.densityMultipliers, "rho");
        const title = `${materialKindLabel(kind)}: ${aggregate.name} | ${confidence}% | ${aggregate.matchType} | ${eText} | ${dText} | ${aggregate.groupCount} groups`;
        return `
          <div class="material-match-chip" title="${escapeAttr(title)}">
            <span class="kind">${escapeHtml(materialKindLabel(kind))} ${escapeHtml(aggregate.matchType)}</span>
            <span class="name">${escapeHtml(aggregate.name)}</span>
            <span class="meta">${confidence}% | ${escapeHtml(eText)} | ${escapeHtml(dText)}</span>
          </div>`;
      }).join("");
    }

    function aggregateSelectedMaterialMatches(matches) {
      const byMaterial = new Map();
      matches.forEach(match => {
        const best = match.best;
        const key = best.baseKey;
        const item = byMaterial.get(key) || {
          key,
          name: best.materialName,
          confidenceSum: 0,
          confidenceWeight: 0,
          groupCount: 0,
          matchTypes: new Map(),
          modulusMultipliers: [],
          densityMultipliers: []
        };
        const weight = Math.max(0.02, Number(best.confidence) || 0);
        item.confidenceSum += weight * weight;
        item.confidenceWeight += weight;
        item.groupCount += 1;
        item.matchTypes.set(best.matchType, (item.matchTypes.get(best.matchType) || 0) + 1);
        if (Number.isFinite(best.modulusMultiplier)) item.modulusMultipliers.push(best.modulusMultiplier);
        if (Number.isFinite(best.densityMultiplier)) item.densityMultipliers.push(best.densityMultiplier);
        byMaterial.set(key, item);
      });
      const items = Array.from(byMaterial.values()).map(item => ({
        ...item,
        confidence: item.confidenceWeight > 0 ? item.confidenceSum / item.confidenceWeight : 0,
        matchType: dominantMatchType(item.matchTypes)
      })).sort((a, b) => b.confidenceWeight - a.confidenceWeight || b.confidence - a.confidence);
      return items[0] || null;
    }

    function dominantMatchType(types) {
      const ordered = ["exact", "scaled", "ambiguous", "unknown"];
      let best = "unknown";
      let bestCount = -1;
      ordered.forEach(type => {
        const count = types.get(type) || 0;
        if (count > bestCount) {
          best = type;
          bestCount = count;
        }
      });
      return best;
    }

    function materialMultiplierRangeText(values, label) {
      const finite = (values || []).map(Number).filter(Number.isFinite);
      if (!finite.length) return `${label}x-`;
      const min = Math.min(...finite);
      const max = Math.max(...finite);
      const value = Math.abs(max - min) < 0.015 ? fmt((min + max) / 2) : `${fmt(min)}..${fmt(max)}`;
      return `${label}x${value}`;
    }

    function materialRecognitionData() {
      if (materialRecognitionCache) return materialRecognitionCache;
      const library = materialLibraryMaterials();
      const groups = observedMaterialGroups(state?.plotData?.materials || []);
      if (!library.length || !groups.length) {
        materialRecognitionCache = { available: false, localMatches: [], globalSummaries: [], globalByKey: new Map() };
        return materialRecognitionCache;
      }

      const localMatches = groups.map(group => {
        const candidates = library
          .filter(material => isMaterialCandidateForKind(group.kind, material))
          .map(material => matchMaterialCandidate(group, material))
          .filter(Boolean)
          .sort((a, b) => a.score - b.score);
        return {
          ...group,
          candidates: dedupeMaterialCandidates(candidates).slice(0, MATERIAL_RECOGNITION_TOP_N),
          best: null
        };
      });

      const global = aggregateGlobalMaterialMatches(localMatches);
      enrichMaterialMatches(localMatches, global.byKey);
      materialRecognitionCache = {
        available: true,
        localMatches,
        globalSummaries: global.summaries,
        globalByKey: global.byKey
      };
      return materialRecognitionCache;
    }

    function observedMaterialGroups(rows) {
      const groups = new Map();
      const fallbackState = new Map();
      asArray(rows).forEach((row, order) => {
        const node = Number(row.nodeIndex);
        const kind = String(row.kind || "");
        const temperatureK = Number(row.temperatureK);
        if (!Number.isFinite(node) || !kind || !Number.isFinite(temperatureK)) return;
        const materialIndex = Number.isFinite(Number(row.materialIndex))
          ? Number(row.materialIndex)
          : fallbackMaterialIndex(fallbackState, row);
        const key = `${node}:${kind}:${materialIndex}`;
        if (!groups.has(key)) {
          groups.set(key, {
            key,
            nodeIndex: node,
            kind,
            materialIndex,
            order,
            points: []
          });
        }
        groups.get(key).points.push({
          temperatureK,
          densityKgM3: Number(row.densityKgM3),
          youngsModulusPa: Number(row.youngsModulusPa),
          poissonRatio: Number(row.poissonRatio),
          compressionMultiplier: Number(row.compressionMultiplier),
          specificHeatJKgK: Number(row.specificHeatJKgK),
          conductivityWMK: Number(row.conductivityWMK)
        });
      });
      return Array.from(groups.values())
        .map(group => ({
          ...group,
          points: group.points.sort((a, b) => a.temperatureK - b.temperatureK)
        }))
        .filter(group => group.points.length);
    }

    function fallbackMaterialIndex(stateMap, row) {
      const baseKey = `${Number(row.nodeIndex)}:${String(row.kind || "")}`;
      const temperature = Number(row.temperatureK);
      const item = stateMap.get(baseKey) || { index: 0, lastTemperature: NaN };
      if (item.index === 0 || (Number.isFinite(item.lastTemperature) && Number.isFinite(temperature) && temperature <= item.lastTemperature)) {
        item.index += 1;
      }
      item.lastTemperature = temperature;
      stateMap.set(baseKey, item);
      return item.index;
    }

    function dedupeMaterialCandidates(candidates) {
      const byKey = new Map();
      candidates.forEach(candidate => {
        const existing = byKey.get(candidate.baseKey);
        if (!existing || candidate.score < existing.score) byKey.set(candidate.baseKey, candidate);
      });
      return Array.from(byKey.values()).sort((a, b) => a.score - b.score);
    }

    function isMaterialCandidateForKind(kind, material) {
      const category = String(material?.category || "").toLowerCase();
      if (kind === "PlyMaterial") return category.includes("ply") || category.includes("reinforcement");
      if (kind === "BulkMaterial") return /(bulk|filler|bead|apex|inner liner)/.test(category);
      if (kind === "TreadMaterial") return /(rubber tread|tread sidewall|inner liner)/.test(category);
      return true;
    }

    function matchMaterialCandidate(group, material) {
      const candidatePoints = asArray(material.points)
        .map(normalizedMaterialPoint)
        .filter(point => Number.isFinite(point.temperatureK))
        .sort((a, b) => a.temperatureK - b.temperatureK);
      if (!candidatePoints.length) return null;

      const fields = [
        { observed: "youngsModulusPa", base: "youngsModulusPa", weight: 2.6, scaled: true, scaleName: "modulusMultiplier" },
        { observed: "densityKgM3", base: "densityKgM3", weight: 1.1, scaled: true, scaleName: "densityMultiplier" },
        { observed: "poissonRatio", base: "poissonsRatio", weight: 1.7, tolerance: 0.08 },
        { observed: "compressionMultiplier", base: "compressionTensionRatio", weight: 1.7, log: true },
        { observed: "specificHeatJKgK", base: "specificHeat", weight: 0.65, log: true },
        { observed: "conductivityWMK", base: "thermalConductivity", weight: 0.9, log: true }
      ];

      let weightedScore = 0;
      let weightSum = 0;
      const result = {
        baseKey: materialIdentityKey(material),
        materialId: Number(material.id),
        materialName: String(material.name || "Material"),
        category: String(material.category || ""),
        score: Infinity,
        modulusMultiplier: NaN,
        densityMultiplier: NaN,
        fieldScores: {}
      };

      fields.forEach(field => {
        const observedValues = [];
        const baseValues = [];
        group.points.forEach(point => {
          const observed = Number(point[field.observed]);
          const base = interpolateMaterialValue(candidatePoints, Number(point.temperatureK), field.base);
          if (Number.isFinite(observed) && Number.isFinite(base)) {
            observedValues.push(observed);
            baseValues.push(base);
          }
        });
        if (!observedValues.length) return;

        let residual = NaN;
        if (field.scaled) {
          const fit = scaledLogFit(observedValues, baseValues);
          residual = fit.residual;
          result[field.scaleName] = fit.multiplier;
          residual += scalePlausibilityPenalty(fit.multiplier);
        } else if (field.log) {
          residual = logResidual(observedValues, baseValues);
        } else {
          residual = absoluteResidual(observedValues, baseValues, field.tolerance || 1);
        }
        if (!Number.isFinite(residual)) return;
        result.fieldScores[field.observed] = residual;
        weightedScore += residual * field.weight;
        weightSum += field.weight;
      });

      if (weightSum <= 0) return null;
      result.score = weightedScore / weightSum;
      result.localLikelihood = materialCandidateLikelihood(result.score);
      return result;
    }

    function normalizedMaterialPoint(point) {
      return {
        temperatureK: Number(point.temperatureK),
        densityKgM3: Number(point.densityKgM3),
        youngsModulusPa: Number(point.youngsModulusPa),
        poissonsRatio: Number(point.poissonsRatio),
        compressionTensionRatio: Number(point.compressionTensionRatio),
        specificHeat: Number(point.specificHeat),
        thermalConductivity: Number(point.thermalConductivity),
        longitudinalConductivity: Number(point.longitudinalConductivity),
        shoreA: Number(point.shoreA)
      };
    }

    function interpolateMaterialValue(points, temperatureK, field) {
      const values = points
        .map(point => ({ temperatureK: Number(point.temperatureK), value: Number(point[field]) }))
        .filter(point => Number.isFinite(point.temperatureK) && Number.isFinite(point.value))
        .sort((a, b) => a.temperatureK - b.temperatureK);
      if (!values.length || !Number.isFinite(temperatureK)) return NaN;
      if (temperatureK <= values[0].temperatureK) return values[0].value;
      if (temperatureK >= values[values.length - 1].temperatureK) return values[values.length - 1].value;
      for (let index = 0; index < values.length - 1; index += 1) {
        const left = values[index];
        const right = values[index + 1];
        if (temperatureK >= left.temperatureK && temperatureK <= right.temperatureK) {
          const ratio = (temperatureK - left.temperatureK) / safeRange(left.temperatureK, right.temperatureK);
          return left.value + (right.value - left.value) * ratio;
        }
      }
      return NaN;
    }

    function scaledLogFit(observedValues, baseValues) {
      const pairs = observedValues.map((observed, index) => [Number(observed), Number(baseValues[index])])
        .filter(([observed, base]) => observed > 0 && base > 0 && Number.isFinite(observed) && Number.isFinite(base));
      if (!pairs.length) return { multiplier: NaN, residual: NaN };
      const logs = pairs.map(([observed, base]) => Math.log(observed / base));
      const multiplier = Math.exp(logs.reduce((sum, value) => sum + value, 0) / logs.length);
      const residual = Math.sqrt(pairs.reduce((sum, [observed, base]) => {
        const error = Math.log(observed / (base * multiplier));
        return sum + error * error;
      }, 0) / pairs.length);
      return { multiplier, residual };
    }

    function logResidual(observedValues, baseValues) {
      const pairs = observedValues.map((observed, index) => [Number(observed), Number(baseValues[index])])
        .filter(([observed, base]) => observed > 0 && base > 0 && Number.isFinite(observed) && Number.isFinite(base));
      if (!pairs.length) return NaN;
      return Math.sqrt(pairs.reduce((sum, [observed, base]) => {
        const error = Math.log(observed / base);
        return sum + error * error;
      }, 0) / pairs.length);
    }

    function absoluteResidual(observedValues, baseValues, tolerance) {
      const pairs = observedValues.map((observed, index) => [Number(observed), Number(baseValues[index])])
        .filter(([observed, base]) => Number.isFinite(observed) && Number.isFinite(base));
      if (!pairs.length) return NaN;
      const scale = Math.max(Number(tolerance) || 1, 1e-12);
      return Math.sqrt(pairs.reduce((sum, [observed, base]) => {
        const error = (observed - base) / scale;
        return sum + error * error;
      }, 0) / pairs.length);
    }

    function scalePlausibilityPenalty(multiplier) {
      const value = Number(multiplier);
      if (!(value > 0)) return 2;
      const logValue = Math.abs(Math.log(value));
      const close = logValue * 0.08;
      const soft = Math.max(0, logValue - Math.log(1.35)) * 0.18;
      const hard = value < 0.25 || value > 4 ? 0.5 : 0;
      return close + soft + hard;
    }

    function aggregateGlobalMaterialMatches(localMatches) {
      const byKey = new Map();
      localMatches.forEach(match => {
        match.candidates.forEach(candidate => {
          const key = `${match.kind}:${candidate.baseKey}`;
          const item = byKey.get(key) || {
            key,
            kind: match.kind,
            baseKey: candidate.baseKey,
            materialId: candidate.materialId,
            materialName: candidate.materialName,
            category: candidate.category,
            likelihood: 0,
            scoreSum: 0,
            groupCount: 0,
            nodes: new Set(),
            modulusMultipliers: [],
            densityMultipliers: []
          };
          const likelihood = materialCandidateLikelihood(candidate.score);
          item.likelihood += likelihood;
          item.scoreSum += candidate.score * likelihood;
          item.groupCount += 1;
          item.nodes.add(match.nodeIndex);
          if (Number.isFinite(candidate.modulusMultiplier)) item.modulusMultipliers.push(candidate.modulusMultiplier);
          if (Number.isFinite(candidate.densityMultiplier)) item.densityMultipliers.push(candidate.densityMultiplier);
          byKey.set(key, item);
        });
      });

      const totalsByKind = new Map();
      byKey.forEach(item => totalsByKind.set(item.kind, (totalsByKind.get(item.kind) || 0) + item.likelihood));
      const summaries = Array.from(byKey.values()).map(item => ({
        ...item,
        nodeCount: item.nodes.size,
        probability: item.likelihood / Math.max(totalsByKind.get(item.kind) || 0, 1e-12),
        score: item.likelihood > 0 ? item.scoreSum / item.likelihood : Infinity,
        nodes: Array.from(item.nodes).sort((a, b) => a - b)
      })).sort((a, b) => materialKindOrder(a.kind) - materialKindOrder(b.kind) || b.probability - a.probability);
      const summaryByKey = new Map(summaries.map(item => [item.key, item]));
      return { summaries, byKey: summaryByKey };
    }

    function enrichMaterialMatches(localMatches, globalByKey) {
      localMatches.forEach(match => {
        const alternatives = match.candidates.map(candidate => {
          const global = globalByKey.get(`${match.kind}:${candidate.baseKey}`);
          const support = global ? 1 + Math.log1p(global.groupCount) * 0.35 + global.probability : 1;
          return {
            ...candidate,
            globalProbability: global?.probability || 0,
            globalGroupCount: global?.groupCount || 0,
            combinedLikelihood: candidate.localLikelihood * support
          };
        }).sort((a, b) => b.combinedLikelihood - a.combinedLikelihood);
        const likelihoodSum = alternatives.reduce((sum, candidate) => sum + candidate.combinedLikelihood, 0);
        match.alternatives = alternatives.map(candidate => ({
          ...candidate,
          confidence: likelihoodSum > 0 ? candidate.combinedLikelihood / likelihoodSum : 0,
          matchType: materialMatchType(candidate, likelihoodSum)
        }));
        match.best = match.alternatives[0] || null;
      });
    }

    function materialCandidateLikelihood(score) {
      const value = clamp(Number(score), 0, 10);
      return Math.exp(-value * 14);
    }

    function materialMatchType(candidate, likelihoodSum) {
      if (!candidate || candidate.score > 0.28) return "unknown";
      const confidence = likelihoodSum > 0 ? candidate.combinedLikelihood / likelihoodSum : 0;
      if (confidence < 0.46) return "ambiguous";
      const eScaled = Number.isFinite(candidate.modulusMultiplier) && Math.abs(Math.log(candidate.modulusMultiplier)) > Math.log(1.04);
      const dScaled = Number.isFinite(candidate.densityMultiplier) && Math.abs(Math.log(candidate.densityMultiplier)) > Math.log(1.04);
      return eScaled || dScaled ? "scaled" : "exact";
    }

    function materialIdentityKey(material) {
      return `${String(material?.category || "")}|${String(material?.name || "")}`.toLowerCase();
    }

    function materialPropertySeries(rows, field, convert, unit, selectedNodes = []) {
      const multiNode = (selectedNodes || []).length > 1;
      const byKind = new Map();
      sortMaterialRows(rows).forEach(row => {
        const raw = Number(row[field]);
        const value = Number.isFinite(raw) ? convert(raw) : NaN;
        const tempC = temperatureC(row);
        if (!Number.isFinite(value) || !Number.isFinite(tempC)) return;
        const kind = String(row.kind || "Material");
        const node = Number(row.nodeIndex);
        const key = multiNode ? `${node}:${kind}` : kind;
        if (!byKind.has(key)) {
          byKind.set(key, {
            key,
            label: multiNode ? `N${node} ${materialKindShort(kind)}` : materialKindLabel(kind),
            color: nodeSeriesColor(node, selectedNodes, kind),
            dash: multiNode ? materialKindDash(kind) : "",
            points: []
          });
        }
        byKind.get(key).points.push({
          x: tempC,
          y: value,
          title: `${multiNode ? `Node ${node} ` : ""}${materialKindLabel(kind)} ${fmt(tempC)} C: ${fmt(value)} ${unit}`
        });
      });

      return Array.from(byKind.values()).map(series => ({
        ...series,
        points: mergeMaterialSeriesPoints(series.points)
      })).filter(series => series.points.length);
    }

    function mergeMaterialSeriesPoints(points) {
      const byTemperature = new Map();
      points.forEach(point => {
        const key = numberKey(point.x);
        const bucket = byTemperature.get(key) || { x: point.x, values: [], titles: [] };
        bucket.values.push(point.y);
        bucket.titles.push(point.title);
        byTemperature.set(key, bucket);
      });
      return Array.from(byTemperature.values())
        .map(bucket => ({
          x: bucket.x,
          y: bucket.values.reduce((sum, value) => sum + value, 0) / bucket.values.length,
          title: bucket.titles.join(" | ")
        }))
        .sort((a, b) => a.x - b.x);
    }

    function materialDimensionlessSeries(rows, selectedNodes = []) {
      const multiNode = (selectedNodes || []).length > 1;
      const seriesByKey = new Map();
      sortMaterialRows(rows).forEach(row => {
        const tempC = temperatureC(row);
        if (!Number.isFinite(tempC)) return;
        const kind = String(row.kind || "Material");
        const node = Number(row.nodeIndex);
        const nodePrefix = multiNode ? `${node}:` : "";
        const labelPrefix = multiNode ? `N${node} ${materialKindShort(kind)}` : materialKindShort(kind);
        [
          {
            key: `${nodePrefix}${kind}-poisson`,
            label: `${labelPrefix} v`,
            value: Number(row.poissonRatio),
            color: nodeSeriesColor(node, selectedNodes, kind),
            dash: "",
            suffix: "Poisson"
          },
          {
            key: `${nodePrefix}${kind}-compression`,
            label: `${labelPrefix} c`,
            value: Number(row.compressionMultiplier),
            color: nodeSeriesColor(node, selectedNodes, kind),
            dash: "3 2",
            suffix: "Compression"
          }
        ].forEach(item => {
          if (!Number.isFinite(item.value)) return;
          if (!seriesByKey.has(item.key)) {
            seriesByKey.set(item.key, {
              key: item.key,
              label: item.label,
              color: item.color,
              dash: item.dash,
              points: []
            });
          }
          seriesByKey.get(item.key).points.push({
            x: tempC,
            y: item.value,
            title: `${multiNode ? `Node ${node} ` : ""}${materialKindLabel(kind)} ${fmt(tempC)} C: ${item.suffix} ${fmt(item.value)}`
          });
        });
      });

      return Array.from(seriesByKey.values()).map(series => ({
        ...series,
        points: mergeMaterialSeriesPoints(series.points)
      })).filter(series => series.points.length);
    }

    function drawMaterialTrendChart(svg, title, seriesList, unit, chartKey) {
      if (!svg) return;
      syncSvgViewBox(svg, 320, 240);
      svg.innerHTML = "";
      const view = svg.viewBox.baseVal;
      const w = view.width || 320;
      const h = view.height || 178;
      const margin = { left: 42, right: 14, top: 32, bottom: 34 };
      const plotW = Math.max(1, w - margin.left - margin.right);
      const plotH = Math.max(1, h - margin.top - margin.bottom);
      const validSeries = seriesList
        .map(series => ({
          ...series,
          points: (series.points || []).filter(point => Number.isFinite(point.x) && Number.isFinite(point.y))
            .sort((a, b) => a.x - b.x)
        }))
        .filter(series => series.points.length);
      const visibleSeries = validSeries.filter(series => !isMaterialSeriesHidden(chartKey, series.key));
      const allPoints = visibleSeries.flatMap(series => series.points);

      svg.insertAdjacentHTML("beforeend", `<text x="10" y="16" fill="#b9d8f2" font-size="10.5" font-weight="700">${escapeHtml(title)}</text>`);
      if (!validSeries.length) {
        drawMaterialEmptyChart(svg, title, "No temperature rows");
        return;
      }
      if (!allPoints.length) {
        svg.insertAdjacentHTML("beforeend", `<text x="${(w / 2).toFixed(1)}" y="${(h / 2).toFixed(1)}" fill="#9aa7b3" font-size="10" text-anchor="middle">All series hidden</text>`);
        drawMaterialSeriesLegend(svg, validSeries, margin.left + 4, margin.top - 8, w - margin.right - margin.left - 8, chartKey);
        return;
      }

      const xValues = allPoints.map(point => point.x);
      const yValues = allPoints.map(point => point.y);
      const xDomain = materialPlotDomain(Math.min(...xValues), Math.max(...xValues), false);
      const yDomain = materialPlotDomain(Math.min(...yValues), Math.max(...yValues), true);
      const xAt = value => margin.left + (Number(value) - xDomain.min) / safeRange(xDomain.min, xDomain.max) * plotW;
      const yAt = value => margin.top + (1 - (Number(value) - yDomain.min) / safeRange(yDomain.min, yDomain.max)) * plotH;

      const yTicks = niceTicks(yDomain.min, yDomain.max, 4).filter(tick => tick >= yDomain.min - Math.abs(yDomain.max) * 1e-9 && tick <= yDomain.max + Math.abs(yDomain.max) * 1e-9);
      const xTicks = niceTicks(xDomain.min, xDomain.max, 4).filter(tick => tick >= xDomain.min - Math.abs(xDomain.max) * 1e-9 && tick <= xDomain.max + Math.abs(xDomain.max) * 1e-9);
      yTicks.forEach(tick => {
        const y = yAt(tick);
        svg.insertAdjacentHTML("beforeend", `<line x1="${margin.left}" y1="${y.toFixed(1)}" x2="${(w - margin.right).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#27323c" stroke-width="0.6"></line>`);
        svg.insertAdjacentHTML("beforeend", `<text x="${(margin.left - 5).toFixed(1)}" y="${(y + 3).toFixed(1)}" fill="#9aa7b3" font-size="7.5" text-anchor="end">${escapeHtml(tickFormat(tick))}</text>`);
      });
      xTicks.forEach(tick => {
        const x = xAt(tick);
        svg.insertAdjacentHTML("beforeend", `<line x1="${x.toFixed(1)}" y1="${margin.top}" x2="${x.toFixed(1)}" y2="${(h - margin.bottom).toFixed(1)}" stroke="#1e2830" stroke-width="0.5"></line>`);
        svg.insertAdjacentHTML("beforeend", `<text x="${x.toFixed(1)}" y="${(h - margin.bottom + 12).toFixed(1)}" fill="#9aa7b3" font-size="7" text-anchor="middle">${escapeHtml(tickFormat(tick))}</text>`);
      });
      svg.insertAdjacentHTML("beforeend", `<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${(h - margin.bottom).toFixed(1)}" stroke="#617286" stroke-width="0.8"></line>`);
      svg.insertAdjacentHTML("beforeend", `<line x1="${margin.left}" y1="${(h - margin.bottom).toFixed(1)}" x2="${(w - margin.right).toFixed(1)}" y2="${(h - margin.bottom).toFixed(1)}" stroke="#617286" stroke-width="0.8"></line>`);
      svg.insertAdjacentHTML("beforeend", `<text x="${(w - margin.right).toFixed(1)}" y="16" fill="#9aa7b3" font-size="7.5" text-anchor="end">${escapeHtml(unit)}</text>`);
      svg.insertAdjacentHTML("beforeend", `<text x="${((margin.left + w - margin.right) / 2).toFixed(1)}" y="${(h - 6).toFixed(1)}" fill="#9aa7b3" font-size="7.5" text-anchor="middle">Temperature [C]</text>`);

      visibleSeries.forEach(series => {
        const path = series.points.map((point, index) => `${index === 0 ? "M" : "L"}${xAt(point.x).toFixed(1)},${yAt(point.y).toFixed(1)}`).join(" ");
        if (series.points.length > 1) {
          svg.insertAdjacentHTML("beforeend",
            `<path d="${path}" fill="none" stroke="${series.color}" stroke-width="1.4" stroke-opacity="0.82" stroke-dasharray="${escapeAttr(series.dash || "")}"></path>`);
        }
        series.points.forEach(point => {
          svg.insertAdjacentHTML("beforeend",
            `<circle cx="${xAt(point.x).toFixed(1)}" cy="${yAt(point.y).toFixed(1)}" r="2.3" fill="${series.color}" stroke="#0b0f12" stroke-width="0.7"><title>${escapeHtml(point.title)}</title></circle>`);
        });
      });

      drawMaterialSeriesLegend(svg, validSeries, margin.left + 4, margin.top - 8, w - margin.right - margin.left - 8, chartKey);
    }

    function drawMaterialSeriesLegend(svg, seriesList, x, y, maxWidth, chartKey) {
      const compact = seriesList.slice(0, 5);
      let cursor = x;
      compact.forEach(series => {
        const label = String(series.label || "");
        const width = Math.min(74, label.length * 5.5 + 24);
        if (cursor + width > x + maxWidth) return;
        const hidden = isMaterialSeriesHidden(chartKey, series.key);
        const opacity = hidden ? 0.34 : 1;
        const textFill = hidden ? "#7f8b96" : "#dceaf7";
        svg.insertAdjacentHTML("beforeend", `
          <g class="material-series-toggle" data-material-chart-key="${escapeAttr(chartKey)}" data-material-series-key="${escapeAttr(series.key)}" opacity="${opacity.toFixed(2)}">
            <rect x="${(cursor - 3).toFixed(1)}" y="${(y - 8).toFixed(1)}" width="${width.toFixed(1)}" height="13" fill="transparent"></rect>
            <line x1="${cursor.toFixed(1)}" y1="${y.toFixed(1)}" x2="${(cursor + 13).toFixed(1)}" y2="${y.toFixed(1)}" stroke="${series.color}" stroke-width="1.7" stroke-dasharray="${escapeAttr(series.dash || "")}"></line>
            <text x="${(cursor + 17).toFixed(1)}" y="${(y + 3).toFixed(1)}" fill="${textFill}" font-size="7.5">${escapeHtml(label)}</text>
            <title>${hidden ? "Show" : "Hide"} ${escapeHtml(label)}</title>
          </g>`);
        cursor += width;
      });
    }

    function drawMaterialEmptyChart(svg, title, message) {
      if (!svg) return;
      syncSvgViewBox(svg, 320, 240);
      svg.innerHTML = "";
      const view = svg.viewBox.baseVal;
      const w = view.width || 320;
      const h = view.height || 178;
      svg.insertAdjacentHTML("beforeend", `<text x="10" y="16" fill="#b9d8f2" font-size="10.5" font-weight="700">${escapeHtml(title)}</text>`);
      svg.insertAdjacentHTML("beforeend", `<text x="${(w / 2).toFixed(1)}" y="${(h / 2).toFixed(1)}" fill="#9aa7b3" font-size="10" text-anchor="middle">${escapeHtml(message)}</text>`);
    }

    function materialPlotDomain(minValue, maxValue, allowZeroFloor) {
      let min = Number(minValue);
      let max = Number(maxValue);
      if (!Number.isFinite(min) || !Number.isFinite(max)) return { min: 0, max: 1 };
      if (Math.abs(max - min) < 1e-12) {
        const pad = Math.max(Math.max(Math.abs(max), 1) * 0.08, 1e-6);
        min -= pad;
        max += pad;
      } else {
        const pad = Math.max(Math.abs(max - min) * 0.08, 1e-9);
        min -= pad;
        max += pad;
      }
      if (allowZeroFloor && min > 0 && min / Math.max(max, 1e-9) < 0.08) min = 0;
      const step = materialNiceStep((max - min) / 3.5);
      let domainMin = Math.floor(min / step) * step;
      let domainMax = Math.ceil(max / step) * step;
      if (domainMax <= domainMin) domainMax = domainMin + step;
      return {
        min: Number(domainMin.toPrecision(12)),
        max: Number(domainMax.toPrecision(12))
      };
    }

    function materialNiceStep(rawStep) {
      const step = Math.abs(Number(rawStep));
      if (!(step > 0)) return 1;
      const magnitude = Math.pow(10, Math.floor(Math.log10(step)));
      const normalized = step / magnitude;
      const nice = normalized <= 1 ? 1 : normalized <= 2 ? 2 : normalized <= 2.5 ? 2.5 : normalized <= 5 ? 5 : 10;
      return nice * magnitude;
    }

    function materialNiceFloor(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n === 0) return 0;
      if (n < 0) return -materialNiceCeil(-n);
      const magnitude = Math.pow(10, Math.floor(Math.log10(n)));
      const normalized = n / magnitude;
      const nice = normalized < 2 ? 1 : normalized < 5 ? 2 : 5;
      return nice * magnitude;
    }

    function materialNiceCeil(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n === 0) return 1;
      if (n < 0) return -materialNiceFloor(-n);
      const magnitude = Math.pow(10, Math.floor(Math.log10(n)));
      const normalized = n / magnitude;
      const nice = normalized <= 1 ? 1 : normalized <= 2 ? 2 : normalized <= 5 ? 5 : 10;
      return nice * magnitude;
    }

    function updateLayerExplodeReadout() {
      const slider = document.getElementById("layer-explode-slider");
      const output = document.getElementById("layer-explode-value");
      const value = clamp(Number(viewState.layerExplode), 0, 100);
      viewState.layerExplode = value;
      if (slider) slider.value = String(Math.round(value));
      if (slider) slider.disabled = viewState.layerExplodeEnabled === false;
      if (output) output.textContent = viewState.layerExplodeEnabled === false ? "off" : String(Math.round(value));
    }

    function updateNodeLayerSpreadReadout() {
      const slider = document.getElementById("node-layer-spread-slider");
      const output = document.getElementById("node-layer-spread-value");
      const value = clamp(Number(viewState.nodeLayerSpread), 0, 100);
      viewState.nodeLayerSpread = value;
      if (slider) slider.value = String(Math.round(value));
      if (output) output.textContent = String(Math.round(value));
      updateNodeDisplayControls();
    }

    function updateNodeDisplayControls() {
      const visibility = nodeSectionVisibility();
      document.querySelectorAll("[data-node-display-target]").forEach(button => {
        const target = normalizeNodeDisplayTarget(button.dataset.nodeDisplayTarget);
        const active = target === "layers" ? visibility.layers : visibility.rest;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function toggleNodeDisplayTarget(target) {
      const normalized = normalizeNodeDisplayTarget(target);
      if (normalized === "layers") {
        viewState.nodeShowLayers = viewState.nodeShowLayers !== false ? false : true;
      } else {
        viewState.nodeShowRest = viewState.nodeShowRest !== false ? false : true;
      }
    }

    function normalizeNodeDisplayTarget(target) {
      const value = String(target || "").trim().toLowerCase();
      return value === "rest" ? "rest" : "layers";
    }

    function nodeSectionVisibility() {
      return {
        layers: viewState.nodeShowLayers !== false,
        rest: viewState.nodeShowRest !== false
      };
    }

    function layerExplodeStrength() {
      if (viewState.layerExplodeEnabled === false) return 0;
      const value = clamp(Number(viewState.layerExplode), 0, 100) / 100;
      return Math.pow(value, 1.25);
    }

    function nodeLayerSpreadStrength() {
      const value = clamp(Number(viewState.nodeLayerSpread), 0, 100) / 100;
      return Math.pow(value, 1.25);
    }

    function handleNodeClickSelection(nodeIndex, event) {
      if (event?.ctrlKey || event?.metaKey) {
        toggleSelectedNode(nodeIndex);
      } else {
        selectNode(nodeIndex);
      }
    }

    function handleNodeExplorerKeydown(event) {
      if (viewState.currentView !== "node-explorer") return;
      const nodes = nodeExplorerNodeIndices();
      if (!nodes.length) return;

      if ((event.ctrlKey || event.metaKey) && String(event.key).toLowerCase() === "a") {
        event.preventDefault();
        setSelectedNodes(nodes, nodes[0]);
        return;
      }

      const activeNode = Number(viewState.selectedNodeIndex);
      let activeIndex = nodes.indexOf(activeNode);
      if (activeIndex < 0) {
        const selected = (viewState.selectedNodeIndices || []).map(Number).filter(Number.isFinite);
        activeIndex = Math.max(0, nodes.indexOf(selected[0]));
      }

      let nextIndex = activeIndex;
      switch (event.key) {
        case "ArrowRight":
        case "ArrowDown":
          nextIndex = Math.max(0, activeIndex - 1);
          break;
        case "ArrowLeft":
        case "ArrowUp":
          nextIndex = Math.min(nodes.length - 1, activeIndex + 1);
          break;
        case "PageDown":
          nextIndex = Math.min(nodes.length - 1, activeIndex + 5);
          break;
        case "PageUp":
          nextIndex = Math.max(0, activeIndex - 5);
          break;
        case "Home":
          nextIndex = 0;
          break;
        case "End":
          nextIndex = nodes.length - 1;
          break;
        default:
          return;
      }

      const nextNode = nodes[nextIndex];
      if (!Number.isFinite(nextNode)) return;
      event.preventDefault();
      if (event.shiftKey) {
        const selected = new Set((viewState.selectedNodeIndices || []).map(Number).filter(Number.isFinite));
        selected.add(nextNode);
        setSelectedNodes(Array.from(selected), nextNode);
      } else {
        setSelectedNodes([nextNode], nextNode);
      }
    }

    function nodeExplorerNodeIndices() {
      return Array.from(new Set((state?.plotData?.geometry || [])
        .map(point => Number(point.nodeIndex))
        .filter(Number.isFinite)))
        .sort((a, b) => a - b);
    }

    function beginNodeSelectionDrag(event) {
      if (event.button !== 0) return;
      if (event.target.closest("[data-focus-key]")) return;
      const svg = event.currentTarget;
      const point = svgPointFromEvent(svg, event);
      if (!point) return;
      svg.focus?.();
      nodeSelectionDrag.active = true;
      nodeSelectionDrag.dragging = false;
      nodeSelectionDrag.plotId = svg.id;
      nodeSelectionDrag.start = point;
      nodeSelectionDrag.current = point;
      nodeSelectionDrag.additive = Boolean(event.ctrlKey || event.metaKey);
      nodeSelectionDrag.suppressClick = false;
      if (svg.setPointerCapture) svg.setPointerCapture(event.pointerId);
    }

    function updateNodeSelectionDrag(event) {
      if (!nodeSelectionDrag.active || nodeSelectionDrag.plotId !== event.currentTarget.id) return;
      const svg = event.currentTarget;
      const point = svgPointFromEvent(svg, event);
      if (!point) return;
      nodeSelectionDrag.current = point;
      const distance = Math.hypot(point.x - nodeSelectionDrag.start.x, point.y - nodeSelectionDrag.start.y);
      if (!nodeSelectionDrag.dragging && distance < 5) return;
      nodeSelectionDrag.dragging = true;
      nodeSelectionDrag.suppressClick = true;
      drawNodeSelectionBox(svg, nodeSelectionDrag.start, point);
      event.preventDefault();
    }

    function finishNodeSelectionDrag(event) {
      if (!nodeSelectionDrag.active || nodeSelectionDrag.plotId !== event.currentTarget.id) return;
      const svg = event.currentTarget;
      if (nodeSelectionDrag.dragging) {
        const rect = selectionRectFromPoints(nodeSelectionDrag.start, nodeSelectionDrag.current);
        const nodes = nodesInSelectionRect(nodeSelectionDrag.plotId, rect);
        applyNodeBoxSelection(nodes, nodeSelectionDrag.additive);
        nodeSelectionDrag.suppressClick = true;
      }
      clearNodeSelectionBox(svg);
      nodeSelectionDrag.active = false;
      nodeSelectionDrag.dragging = false;
      nodeSelectionDrag.plotId = "";
      nodeSelectionDrag.start = null;
      nodeSelectionDrag.current = null;
      if (svg.releasePointerCapture && event.pointerId !== undefined) {
        try { svg.releasePointerCapture(event.pointerId); } catch {}
      }
      if (nodeSelectionDrag.suppressClick) event.preventDefault();
    }

    function cancelNodeSelectionDrag(event) {
      clearNodeSelectionBox(event.currentTarget);
      nodeSelectionDrag.active = false;
      nodeSelectionDrag.dragging = false;
      nodeSelectionDrag.plotId = "";
      nodeSelectionDrag.start = null;
      nodeSelectionDrag.current = null;
    }

    function drawNodeSelectionBox(svg, start, current) {
      clearNodeSelectionBox(svg);
      const rect = selectionRectFromPoints(start, current);
      svg.insertAdjacentHTML("beforeend",
        `<rect id="node-selection-box" class="node-selection-box" x="${rect.x.toFixed(1)}" y="${rect.y.toFixed(1)}" width="${rect.width.toFixed(1)}" height="${rect.height.toFixed(1)}"></rect>`);
    }

    function clearNodeSelectionBox(svg) {
      svg?.querySelector("#node-selection-box")?.remove();
    }

    function selectionRectFromPoints(start, current) {
      const x1 = Math.min(start.x, current.x);
      const y1 = Math.min(start.y, current.y);
      const x2 = Math.max(start.x, current.x);
      const y2 = Math.max(start.y, current.y);
      return { x: x1, y: y1, width: x2 - x1, height: y2 - y1 };
    }

    function nodesInSelectionRect(plotId, rect) {
      return (plotHitMaps.get(plotId) || [])
        .filter(entry => entry.x >= rect.x && entry.x <= rect.x + rect.width && entry.y >= rect.y && entry.y <= rect.y + rect.height)
        .map(entry => entry.nodeIndex)
        .filter(Number.isFinite)
        .sort((a, b) => a - b);
    }

    function applyNodeBoxSelection(nodeIndices, additive) {
      const nodes = Array.from(new Set((nodeIndices || []).map(Number).filter(Number.isFinite)));
      if (!nodes.length) return;
      if (!additive) {
        setSelectedNodes(nodes, nodes[0]);
        return;
      }
      const selected = new Set((viewState.selectedNodeIndices || []).map(Number).filter(Number.isFinite));
      nodes.forEach(node => {
        if (selected.has(node) && selected.size > 1) {
          selected.delete(node);
        } else {
          selected.add(node);
        }
      });
      setSelectedNodes(Array.from(selected), nodes[0]);
    }

    function selectNode(nodeIndex) {
      setSelectedNodes([nodeIndex], nodeIndex);
    }

    function toggleSelectedNode(nodeIndex) {
      if (!Number.isFinite(nodeIndex)) return;
      const selected = new Set((viewState.selectedNodeIndices || []).map(Number).filter(Number.isFinite));
      if (selected.has(nodeIndex) && selected.size > 1) {
        selected.delete(nodeIndex);
      } else {
        selected.add(nodeIndex);
      }
      setSelectedNodes(Array.from(selected), nodeIndex);
    }

    function setSelectedNodes(nodeIndices, activeNode = null) {
      const selected = Array.from(new Set((nodeIndices || []).map(Number).filter(Number.isFinite))).sort((a, b) => a - b);
      const active = Number(activeNode);
      viewState.selectedNodeIndices = selected;
      viewState.selectedNodeIndex = selected.includes(active) ? active : selected[0] ?? null;
      renderCurrentView();
    }

    function sameNode(left, right) {
      return Number.isFinite(Number(left)) && Number(left) === Number(right);
    }

    function nodeCloneGroups(points, rubber, layers, materials) {
      const selectedNodes = selectedNodeIndicesOrDefault(points);
      const selectedSet = new Set(selectedNodes);
      const selectedProfiles = selectedNodes.map(node => nodeCloneProfile(node, rubber, layers, materials));
      const exactKeys = new Set(selectedProfiles.map(profile => profile.exactKey));
      const familyKeys = new Set(selectedProfiles.map(profile => profile.familyKey));
      const exact = new Set();
      const family = new Set();

      points.forEach(point => {
        const node = Number(point.nodeIndex);
        if (!Number.isFinite(node) || selectedSet.has(node)) return;
        const profile = nodeCloneProfile(node, rubber, layers, materials);
        if (exactKeys.has(profile.exactKey)) {
          exact.add(node);
        } else if (familyKeys.has(profile.familyKey)) {
          family.add(node);
        }
      });

      return {
        selectedNodes,
        selectedSet,
        exact,
        family,
        selectedProfiles
      };
    }

    function nodeCloneProfile(nodeIndex, rubber, layers, materials) {
      const rubberRow = rubber.find(row => sameNode(row.nodeIndex, nodeIndex)) || {};
      const nodeLayers = layers.filter(row => sameNode(row.nodeIndex, nodeIndex))
        .sort((a, b) => Number(a.plyIndex) - Number(b.plyIndex));
      const materialRows = (materials || []).filter(row => sameNode(row.nodeIndex, nodeIndex))
        .sort((a, b) => String(a.kind).localeCompare(String(b.kind)) || numberKey(a.temperatureK).localeCompare(numberKey(b.temperatureK)));

      const materialKey = materialRows.map(row => [
        String(row.kind || ""),
        numberKey(row.temperatureK),
        numberKey(row.densityKgM3),
        numberKey(row.youngsModulusPa),
        numberKey(row.poissonRatio),
        numberKey(row.compressionMultiplier),
        numberKey(row.specificHeatJKgK),
        numberKey(row.conductivityWMK)
      ].join(":")).join("|");

      const familyLayers = nodeLayers.map(row => [
        numberKey(row.plyIndex),
        numberKey(row.angleDeg),
        numberKey(row.connectFlag)
      ].join(":")).join("|");
      const exactLayers = nodeLayers.map(row => [
        numberKey(row.plyIndex),
        numberKey(row.angleDeg),
        numberKey(row.connectFlag),
        numberKey(row.thicknessM)
      ].join(":")).join("|");

      const familyKey = [
        `plies=${familyLayers}`,
        `materials=${materialKey}`
      ].join(";");
      const exactKey = [
        familyKey,
        `tread=${numberKey(rubberRow.treadDepthM)}`,
        `node=${numberKey(rubberRow.nodeThicknessM)}`,
        `layers=${exactLayers}`
      ].join(";");

      return { familyKey, exactKey };
    }

    function nodeMarkerStyle(nodeIndex, cloneGroups) {
      const node = Number(nodeIndex);
      if (cloneGroups?.selectedSet?.has(node)) {
        return {
          fill: "#4fb3ff",
          stroke: "#dce6ef",
          strokeWidth: "1.6",
          strokeOpacity: "1",
          radius: "4.4",
          title: `Node ${node} selected`
        };
      }
      if (cloneGroups?.exact.has(node)) {
        return {
          fill: "#6be675",
          stroke: "#0b0f12",
          strokeWidth: "1.1",
          strokeOpacity: "1",
          radius: "3.8",
          title: `Node ${node} exact clone`
        };
      }
      if (cloneGroups?.family.has(node)) {
        return {
          fill: "#f0b85a",
          stroke: "#0b0f12",
          strokeWidth: "1",
          strokeOpacity: "1",
          radius: "3.4",
          title: `Node ${node} same build, different thickness`
        };
      }
      return {
        fill: "#e6edf3",
        stroke: "#0b0f12",
        strokeWidth: "0.4",
        strokeOpacity: "1",
        radius: "2.4",
        title: `Node ${node}`
      };
    }

    function drawCloneLegend(svg, cloneGroups) {
      const x = 70;
      const y = 46;
      const rows = [
        { label: `${cloneGroups.selectedNodes.length} selected`, color: "#4fb3ff" },
        { label: `exact ${cloneGroups.exact.size}`, color: "#6be675" },
        { label: `same build ${cloneGroups.family.size}`, color: "#f0b85a" }
      ];
      rows.forEach((row, index) => {
        const rowY = y + index * 15;
        svg.insertAdjacentHTML("beforeend", `<circle cx="${x}" cy="${rowY}" r="3.4" fill="${row.color}" stroke="#0b0f12" stroke-width="0.7"></circle>`);
        svg.insertAdjacentHTML("beforeend", `<text x="${x + 10}" y="${rowY + 3}" fill="#dceaf7" font-size="9">${escapeHtml(row.label)}</text>`);
      });
    }

    function storeNodeHitMap(svg, frame, points) {
      const entries = points
        .map(point => ({
          nodeIndex: Number(point.nodeIndex),
          x: frame.sx(point.xMm),
          y: frame.sy(point.yMm)
        }))
        .filter(point => Number.isFinite(point.nodeIndex) && Number.isFinite(point.x) && Number.isFinite(point.y));

      entries.forEach(entry => {
        const nearestDistance = entries.reduce((best, other) => {
          if (other === entry) return best;
          return Math.min(best, Math.hypot(entry.x - other.x, entry.y - other.y));
        }, Infinity);
        entry.radius = Number.isFinite(nearestDistance) ? Math.max(12, nearestDistance / 2 + 2) : 24;
      });
      plotHitMaps.set(svg.id, entries);
    }

    function nearestNodeFromEvent(event, plotId) {
      const svg = document.getElementById(plotId);
      const point = svgPointFromEvent(svg, event);
      const hit = nearestNodeHit(plotHitMaps.get(plotId) || [], point);
      return hit ? hit.nodeIndex : NaN;
    }

    function nearestNodeHit(entries, point) {
      if (!entries.length || !point) return null;
      const best = entries.reduce((candidate, entry) => {
        const distance = Math.hypot(entry.x - point.x, entry.y - point.y);
        return !candidate || distance < candidate.distance ? { ...entry, distance } : candidate;
      }, null);
      return best && best.distance <= best.radius ? best : null;
    }

    function svgPointFromEvent(svg, event) {
      const rect = svg.getBoundingClientRect();
      const view = svg.viewBox.baseVal;
      return {
        x: view.x + (event.clientX - rect.left) / Math.max(rect.width, 1) * view.width,
        y: view.y + (event.clientY - rect.top) / Math.max(rect.height, 1) * view.height
      };
    }

    function numberKey(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n.toPrecision(12) : "";
    }

    function applyLayerExplosion(rubber, layers, strength, targetShiftMm = 0) {
      if (!layers.length || !(strength > 0)) return layers;

      const rubberByNode = new Map();
      rubber.forEach(row => {
        const node = Number(row.nodeIndex);
        if (Number.isFinite(node)) rubberByNode.set(node, row);
      });

      const referenceGapMm = layerReferenceGapMm(layers);
      const byNode = new Map();
      layers.forEach(row => {
        const node = Number(row.nodeIndex);
        if (!Number.isFinite(node)) return;
        if (!byNode.has(node)) byNode.set(node, []);
        byNode.get(node).push(row);
      });

      const transformed = new Map();
      byNode.forEach((rows, node) => {
        const rubberRow = rubberByNode.get(node);
        const unit = layerExplosionUnit(rubberRow);
        if (!rubberRow || !unit) {
          rows.forEach(row => transformed.set(row, row));
          return;
        }

        const surfaceX = Number(rubberRow.surfaceXMm);
        const surfaceY = Number(rubberRow.surfaceYMm);
        const nodeThicknessMm = Number(rubberRow.nodeThicknessM) * 1000;
        const baseOffsetMm = Number.isFinite(nodeThicknessMm) && nodeThicknessMm > 0 ? nodeThicknessMm : 0;
        const layerPlan = buildNodeLayerSpreadPlan(rows, baseOffsetMm, referenceGapMm, strength, targetShiftMm);

        layerPlan.forEach(item => {
          transformed.set(item.row, {
            ...item.row,
            xMm: surfaceX + unit.x * item.displayCenter,
            yMm: surfaceY + unit.y * item.displayCenter,
            innerXMm: surfaceX + unit.x * item.displayInner,
            innerYMm: surfaceY + unit.y * item.displayInner,
            outerXMm: surfaceX + unit.x * item.displayOuter,
            outerYMm: surfaceY + unit.y * item.displayOuter
          });
        });
      });

      return layers.map(row => transformed.get(row) || row);
    }

    function buildNodeLayerSpreadPlan(rows, baseOffsetMm, referenceGapMm, strength, targetShiftMm) {
      let trueCursor = baseOffsetMm;
      let displayCursor = baseOffsetMm;
      const layerPlan = [];

      rows.slice()
        .sort((a, b) => layerInnerOffsetMm(a) - layerInnerOffsetMm(b) || Number(a.plyIndex) - Number(b.plyIndex))
        .forEach(row => {
          const innerOffset = Math.max(baseOffsetMm, layerInnerOffsetMm(row));
          const outerOffset = Math.max(innerOffset, layerOuterOffsetMm(row));
          const interGap = positiveLayerGapMm(innerOffset - trueCursor);
          displayCursor += explodedLayerGap(interGap, referenceGapMm, 1);
          const expandedInner = displayCursor;
          const expandedThickness = explodedLayerGap(positiveLayerGapMm(outerOffset - innerOffset), referenceGapMm, 1);
          const expandedOuter = expandedInner + expandedThickness;
          const centerOffset = innerOffset + (outerOffset - innerOffset) / 2;

          layerPlan.push({
            row,
            innerOffset,
            outerOffset,
            centerOffset,
            innerExtra: expandedInner - innerOffset,
            outerExtra: expandedOuter - outerOffset,
            centerExtra: expandedInner + expandedThickness / 2 - centerOffset
          });

          trueCursor = Math.max(trueCursor, outerOffset);
          displayCursor = expandedOuter;
        });

      const maxExtra = Math.max(0, ...layerPlan.map(item => item.outerExtra));
      const maxShift = Number(targetShiftMm);
      const extraScale = maxExtra > 0 && Number.isFinite(maxShift) && maxShift > 0 ? maxShift / maxExtra : 1;
      return layerPlan.map(item => ({
        ...item,
        displayInner: item.innerOffset + item.innerExtra * extraScale * strength,
        displayOuter: item.outerOffset + item.outerExtra * extraScale * strength,
        displayCenter: item.centerOffset + item.centerExtra * extraScale * strength
      }));
    }

    function buildNodeRestSpreadPlan(treadDepthMm, nodeThicknessMm, strength, targetShiftMm) {
      const treadDepth = Math.max(0, Number(treadDepthMm) || 0);
      const nodeThickness = Math.max(treadDepth, Number(nodeThicknessMm) || 0);
      if (!(strength > 0)) {
        return {
          displayTreadDepthMm: treadDepth,
          displayNodeThicknessMm: nodeThickness,
          nodeExtraMm: 0
        };
      }

      const nodeBulk = Math.max(0, nodeThickness - treadDepth);
      const reference = nodeRestReferenceGapMm(treadDepth, nodeBulk);
      const expandedTread = explodedRestGap(treadDepth, reference, 1);
      const expandedBulk = explodedRestGap(nodeBulk, reference, 1);
      const maxExtra = Math.max(0, expandedTread + expandedBulk - nodeThickness);
      const maxShift = Number(targetShiftMm);
      const extraScale = maxExtra > 0 && Number.isFinite(maxShift) && maxShift > 0 ? maxShift / maxExtra : 1;
      const treadExtra = (expandedTread - treadDepth) * extraScale * strength;
      const nodeExtra = maxExtra * extraScale * strength;

      return {
        displayTreadDepthMm: treadDepth + treadExtra,
        displayNodeThicknessMm: nodeThickness + nodeExtra,
        nodeExtraMm: nodeExtra
      };
    }

    function shiftNodeLayerPlan(layerPlan, offsetMm) {
      const offset = Number(offsetMm);
      if (!(Math.abs(offset) > 1e-9)) return layerPlan;
      return layerPlan.map(item => ({
        ...item,
        displayInner: item.displayInner + offset,
        displayOuter: item.displayOuter + offset,
        displayCenter: item.displayCenter + offset
      }));
    }

    function nodeRestReferenceGapMm(treadDepthMm, nodeBulkMm) {
      const gaps = [treadDepthMm, nodeBulkMm]
        .map(Number)
        .filter(value => Number.isFinite(value) && value > 0)
        .sort((a, b) => a - b);
      if (!gaps.length) return 1;
      return Math.max(0.5, gaps[Math.floor(gaps.length / 2)]);
    }

    function explodedRestGap(gapMm, referenceGapMm, strength) {
      const gap = Math.max(0, Number(gapMm));
      if (!(gap > 0) || !(strength > 0)) return gap;

      const reference = Math.max(0.5, Number(referenceGapMm) || 1);
      const smallGapWeight = reference / (gap + reference);
      const targetGap = Math.max(gap, gap * (1 - smallGapWeight) + reference * 2.8 * smallGapWeight);
      return gap + (targetGap - gap) * strength;
    }

    function layerReferenceGapMm(layers) {
      const gaps = layers
        .map(row => layerThicknessMm(row))
        .filter(value => Number.isFinite(value) && value > 0)
        .sort((a, b) => a - b);
      if (!gaps.length) return 0.25;
      return Math.max(0.05, gaps[Math.floor(gaps.length / 2)]);
    }

    function explodedLayerGap(gapMm, referenceGapMm, strength) {
      const gap = Math.max(0, Number(gapMm));
      if (!(gap > 0) || !(strength > 0)) return gap;

      const reference = Math.max(0.05, Number(referenceGapMm) || 0.25);
      const smallGapWeight = reference / (gap + reference);
      const targetGap = gap * (1 - smallGapWeight) + reference * 20 * smallGapWeight;
      return gap + (targetGap - gap) * strength;
    }

    function layerExplosionUnit(row) {
      if (!row) return null;
      const surfaceX = Number(row.surfaceXMm);
      const surfaceY = Number(row.surfaceYMm);
      const innerX = Number(row.innerXMm);
      const innerY = Number(row.innerYMm);
      let dx = innerX - surfaceX;
      let dy = innerY - surfaceY;
      let length = Math.hypot(dx, dy);
      if (!(length > 1e-9)) {
        dx = Number(row.treadXMm) - surfaceX;
        dy = Number(row.treadYMm) - surfaceY;
        length = Math.hypot(dx, dy);
      }
      if (!(length > 1e-9)) return null;
      return { x: dx / length, y: dy / length };
    }

    function layerInnerOffsetMm(row) {
      const offset = Number(row.offsetM) * 1000;
      const thickness = layerThicknessMm(row);
      return Number.isFinite(offset) ? offset - thickness / 2 : 0;
    }

    function layerOuterOffsetMm(row) {
      const offset = Number(row.offsetM) * 1000;
      const thickness = layerThicknessMm(row);
      return Number.isFinite(offset) ? offset + thickness / 2 : layerInnerOffsetMm(row);
    }

    function layerThicknessMm(row) {
      const thickness = Number(row.thicknessM) * 1000;
      return Number.isFinite(thickness) && thickness > 0 ? thickness : 0;
    }

    function positiveLayerGapMm(value) {
      const gap = Number(value);
      return Number.isFinite(gap) && gap > 1e-6 ? gap : 0;
    }

    function drawNodeLayerGuides(svg, frame, points, layers) {
      if (!points.length || !layers.length) return;

      const deepestByNode = deepestLayerByNode(layers);
      points.forEach(point => {
        const node = Number(point.nodeIndex);
        const layer = deepestByNode.get(node);
        if (!layer || !Number.isFinite(point.xMm) || !Number.isFinite(point.yMm)) return;
        const key = geometryFocusKey("layer", layer.plyIndex);
        svg.insertAdjacentHTML("beforeend",
          `<line class="node-layer-guide" x1="${frame.sx(point.xMm).toFixed(1)}" y1="${frame.sy(point.yMm).toFixed(1)}" x2="${frame.sx(layer.xMm).toFixed(1)}" y2="${frame.sy(layer.yMm).toFixed(1)}" opacity="${focusOpacity(key, 0.18).toFixed(2)}"><title>Node ${escapeHtml(point.nodeIndex)} to layer ${escapeHtml(layer.plyIndex)}</title></line>`);
      });
    }

    function deepestLayerByNode(layers) {
      const deepestByNode = new Map();
      layers.forEach(row => {
        const node = Number(row.nodeIndex);
        const offset = Number(row.offsetM);
        if (!Number.isFinite(node) || !Number.isFinite(offset) || !Number.isFinite(row.xMm) || !Number.isFinite(row.yMm)) return;
        const current = deepestByNode.get(node);
        if (!current || offset > current.offset) deepestByNode.set(node, { ...row, offset });
      });
      return deepestByNode;
    }

    function drawNodeNumbers(svg, frame, points, layers) {
      const valid = points.filter(p => Number.isFinite(p.xMm) && Number.isFinite(p.yMm));
      if (!valid.length) return;

      const centerX = valid.reduce((sum, p) => sum + p.xMm, 0) / valid.length;
      const centerY = valid.reduce((sum, p) => sum + p.yMm, 0) / valid.length;
      const deepestByNode = deepestLayerByNode(layers);
      valid.forEach(p => {
        const layer = deepestByNode.get(Number(p.nodeIndex));
        const dx = layer ? p.xMm - layer.xMm : p.xMm - centerX;
        const dy = layer ? p.yMm - layer.yMm : p.yMm - centerY;
        const length = Math.hypot(dx, dy) || 1;
        const unitX = dx / length;
        const unitY = dy / length;
        const x = frame.sx(p.xMm) + unitX * 9;
        const y = frame.sy(p.yMm) - unitY * 9;
        const anchor = Math.abs(unitX) < 0.25 ? "middle" : unitX < 0 ? "end" : "start";
        svg.insertAdjacentHTML("beforeend",
          `<text class="node-label" x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle">${escapeHtml(p.nodeIndex)}</text>`);
      });
    }

    function makeFrame(svg, xs, ys, equalScale) {
      const view = svg.viewBox.baseVal;
      const w = view.width || 1100;
      const h = view.height || 520;
      const margin = { left: 58, right: 36, top: 38, bottom: 50 };
      let minX = Math.min(...xs), maxX = Math.max(...xs);
      let minY = Math.min(...ys), maxY = Math.max(...ys);
      const padX = Math.max((maxX - minX) * 0.05, 1);
      const padY = Math.max((maxY - minY) * 0.08, 1);
      minX -= padX; maxX += padX; minY -= padY; maxY += padY;
      if (equalScale) {
        const plotW = w - margin.left - margin.right;
        const plotH = h - margin.top - margin.bottom;
        const scale = Math.min(plotW / safeRange(minX, maxX), plotH / safeRange(minY, maxY));
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;
        minX = centerX - plotW / scale / 2;
        maxX = centerX + plotW / scale / 2;
        minY = centerY - plotH / scale / 2;
        maxY = centerY + plotH / scale / 2;
      }
      return {
        w, h, margin, minX, maxX, minY, maxY,
        sx: x => margin.left + (x - minX) / safeRange(minX, maxX) * (w - margin.left - margin.right),
        sy: y => h - margin.bottom - (y - minY) / safeRange(minY, maxY) * (h - margin.top - margin.bottom)
      };
    }

    function drawAxes(svg, frame, xLabel, yLabel) {
      const left = frame.margin.left;
      const right = frame.w - frame.margin.right;
      const top = frame.margin.top;
      const bottom = frame.h - frame.margin.bottom;
      svg.insertAdjacentHTML("beforeend", `<g class="axis"><line x1="${left}" y1="${bottom}" x2="${right}" y2="${bottom}"></line><line x1="${left}" y1="${top}" x2="${left}" y2="${bottom}"></line></g>`);
      niceTicks(frame.minX, frame.maxX, 6).forEach(value => {
        const x = frame.sx(value);
        svg.insertAdjacentHTML("beforeend", `<g class="axis"><line x1="${x.toFixed(1)}" y1="${bottom}" x2="${x.toFixed(1)}" y2="${bottom + 5}"></line><text x="${x.toFixed(1)}" y="${bottom + 20}" text-anchor="middle">${tickFormat(value)}</text></g>`);
      });
      niceTicks(frame.minY, frame.maxY, 6).forEach(value => {
        const y = frame.sy(value);
        svg.insertAdjacentHTML("beforeend", `<g class="axis"><line x1="${left - 5}" y1="${y.toFixed(1)}" x2="${left}" y2="${y.toFixed(1)}"></line><text x="${left - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end">${tickFormat(value)}</text></g>`);
      });
      svg.insertAdjacentHTML("beforeend", `<text class="axis-label" x="${(left + right) / 2}" y="${frame.h - 14}" text-anchor="middle">${escapeHtml(xLabel)}</text>`);
      svg.insertAdjacentHTML("beforeend", `<text class="axis-label" transform="translate(18 ${(top + bottom) / 2}) rotate(-90)" text-anchor="middle">${escapeHtml(yLabel)}</text>`);
    }

    function toggleGeometryFocus(key) {
      viewState.focusKey = key && viewState.focusKey !== key ? key : "";
      renderCurrentView();
    }

    function geometryFocusKey(kind, layer = null) {
      return kind === "layer" ? `layer:${Number(layer)}` : String(kind || "");
    }

    function focusOpacity(key, dimOpacity = 0.18) {
      return !viewState.focusKey || viewState.focusKey === key ? 1 : dimOpacity;
    }

    function focusStrokeOpacity(key, baseOpacity, dimOpacity = 0.12) {
      return baseOpacity * focusOpacity(key, dimOpacity);
    }

    function drawRubber(svg, frame, rows) {
      if (rows.length < 2) return;
      const ordered = rows.slice().sort((a, b) => Number(a.nodeIndex) - Number(b.nodeIndex));
      const treadBand = bandPath(ordered, frame, "surfaceXMm", "surfaceYMm", "treadXMm", "treadYMm");
      const bulkBand = bandPath(ordered, frame, "treadXMm", "treadYMm", "innerXMm", "innerYMm");
      const treadKey = geometryFocusKey("tread");
      const thicknessKey = geometryFocusKey("thickness");
      svg.insertAdjacentHTML("beforeend", `<path d="${bulkBand}" fill="#78d3ff" fill-opacity="${focusStrokeOpacity(thicknessKey, 0.11, 0.08).toFixed(3)}" stroke="#78d3ff" stroke-opacity="${focusStrokeOpacity(thicknessKey, 0.35).toFixed(3)}" stroke-width="0.9"><title>Node thickness</title></path>`);
      svg.insertAdjacentHTML("beforeend", `<path d="${treadBand}" fill="#f0b85a" fill-opacity="${focusStrokeOpacity(treadKey, 0.18, 0.08).toFixed(3)}" stroke="#f0b85a" stroke-opacity="${focusStrokeOpacity(treadKey, 0.5).toFixed(3)}" stroke-width="0.9"><title>Tread depth</title></path>`);
      svg.insertAdjacentHTML("beforeend", `<path d="${pointPath(ordered, frame, "treadXMm", "treadYMm")}" fill="none" stroke="#f0b85a" stroke-width="1.4" stroke-dasharray="4 3" opacity="${focusOpacity(treadKey).toFixed(2)}"/>`);
      svg.insertAdjacentHTML("beforeend", `<path d="${pointPath(ordered, frame, "innerXMm", "innerYMm")}" fill="none" stroke="#78d3ff" stroke-width="1.4" opacity="${focusOpacity(thicknessKey).toFixed(2)}"/>`);
    }

    function drawLayers(svg, frame, rows) {
      const layers = [...new Set(rows.map(row => Number(row.plyIndex || 1)))].sort((a, b) => a - b);
      layers.forEach((layer, index) => {
        const color = COLORS[index % COLORS.length];
        const key = geometryFocusKey("layer", layer);
        const subset = rows.filter(row => Number(row.plyIndex || 1) === layer)
          .sort((a, b) => Number(a.nodeIndex) - Number(b.nodeIndex));
        splitSegments(subset).forEach(segment => {
          if (segment.length < 2) return;
          svg.insertAdjacentHTML("beforeend", `<path d="${bandPath(segment, frame, "innerXMm", "innerYMm", "outerXMm", "outerYMm")}" fill="${color}" fill-opacity="${focusStrokeOpacity(key, 0.14, 0.08).toFixed(3)}" stroke="${color}" stroke-opacity="${focusStrokeOpacity(key, 0.35).toFixed(3)}" stroke-width="0.75"><title>Layer ${layer}</title></path>`);
          svg.insertAdjacentHTML("beforeend", `<path d="${pointPath(segment, frame, "xMm", "yMm")}" fill="none" stroke="${color}" stroke-width="1.2" opacity="${focusOpacity(key).toFixed(2)}"/>`);
        });
      });
    }

    function drawLineCallouts(svg, frame, rubber, layers) {
      if (!rubber.length) return;
      const specs = calloutSpecs(rubber, layers);
      if (!specs.length) return;

      const labelBox = calloutLabelBox(frame, rubber, specs);
      const callouts = chooseCalloutTargets(frame, specs, labelBox);
      layoutCallouts(frame, callouts, labelBox.centerY).forEach(item => drawCallout(svg, frame, item, labelBox.x, item.labelY, labelBox.width));
    }

    function calloutSpecs(rubber, layers) {
      const rubberRows = rubber.filter(row => Number.isFinite(row.surfaceXMm) && Number.isFinite(row.surfaceYMm));
      const specs = [
        {
          label: "Surface",
          color: "#dce6ef",
          kind: "surface",
          depth: 0,
          candidates: rubberRows.map(row => ({ x: row.surfaceXMm, y: row.surfaceYMm, nodeIndex: row.nodeIndex }))
        },
        {
          label: "TreadDepth",
          color: "#f0b85a",
          kind: "tread",
          depth: 1,
          candidates: rubberRows.map(row => ({ x: row.treadXMm, y: row.treadYMm, nodeIndex: row.nodeIndex }))
        },
        {
          label: "Node thickness",
          color: "#78d3ff",
          kind: "thickness",
          depth: 2,
          candidates: rubberRows.map(row => ({ x: row.innerXMm, y: row.innerYMm, nodeIndex: row.nodeIndex }))
        }
      ];

      const layerIds = [...new Set(layers.map(row => Number(row.plyIndex)))].filter(Number.isFinite).sort((a, b) => a - b);
      const totalNodeCount = new Set(rubberRows.map(row => Number(row.nodeIndex))).size || 1;
      layerIds.slice(0, 7).forEach(layer => {
        const layerRows = layers.filter(row => Number(row.plyIndex) === layer);
        const nodeStats = layerNodeStats(layerRows, totalNodeCount);
        specs.push({
          label: `Layer ${layer}`,
          color: COLORS[(layer - 1) % COLORS.length],
          kind: "layer",
          depth: 2 + layer,
          layer,
          localLayer: nodeStats.localLayer,
          coverageRatio: nodeStats.coverageRatio,
          spanCount: nodeStats.spanCount,
          candidates: layerRows
            .map(row => ({ x: row.xMm, y: row.yMm, nodeIndex: row.nodeIndex }))
        });
      });

      return specs
        .map(spec => ({ ...spec, candidates: spec.candidates.filter(point => Number.isFinite(point.x) && Number.isFinite(point.y)) }))
        .filter(spec => spec.candidates.length);
    }

    function layerNodeStats(rows, totalNodeCount) {
      const nodes = [...new Set(rows.map(row => Number(row.nodeIndex)).filter(Number.isFinite))].sort((a, b) => a - b);
      let spanCount = 0;
      let previous = NaN;
      nodes.forEach(node => {
        if (!Number.isFinite(previous) || node > previous + 1) spanCount += 1;
        previous = node;
      });
      const coverageRatio = nodes.length / Math.max(totalNodeCount, 1);
      return {
        coverageRatio,
        spanCount,
        localLayer: coverageRatio < 0.85 || spanCount > 1
      };
    }

    function chooseCalloutTargets(frame, specs, labelBox) {
      const labelStep = 19;
      const minTargetGap = 26;
      const topSlot = labelBox.centerY - (specs.length - 1) * labelStep / 2;
      const minTargetX = labelBox.x + labelBox.width + 46;
      const preferredTargetX = minTargetX + 260;

      const plans = specs.map((spec, index) => {
        const visibleCandidates = spec.candidates
          .map(point => ({ ...point, sx: frame.sx(point.x), sy: frame.sy(point.y) }))
          .filter(point => point.sx >= minTargetX);
        return {
          spec: { ...spec, orderIndex: index },
          orderIndex: index,
          desiredY: spec.localLayer ? medianCandidateY(visibleCandidates.length ? visibleCandidates : spec.candidates, frame) : topSlot + index * labelStep,
          candidates: visibleCandidates.length
          ? visibleCandidates
          : spec.candidates.map(point => ({ ...point, sx: frame.sx(point.x), sy: frame.sy(point.y) }))
        };
      });

      let selected = [];
      plans.forEach(plan => {
        const point = bestCalloutCandidate(plan, selected, minTargetX, preferredTargetX, minTargetGap, 7);
        selected.push(calloutFromCandidate(plan.spec, point));
      });

      selected = relaxCalloutSpacing(plans, selected, minTargetX, preferredTargetX, minTargetGap);
      return arrangeCalloutOrder(selected);
    }

    function medianCandidateY(candidates, frame) {
      const values = candidates
        .map(point => Number.isFinite(point.sy) ? point.sy : frame.sy(point.y))
        .filter(Number.isFinite)
        .sort((a, b) => a - b);
      return values.length ? values[Math.floor(values.length / 2)] : NaN;
    }

    function arrangeCalloutOrder(callouts) {
      return callouts.slice().sort((a, b) => {
        const aDynamic = a.localLayer === true;
        const bDynamic = b.localLayer === true;
        if (aDynamic || bDynamic) return a.sy - b.sy || a.orderIndex - b.orderIndex;
        return a.orderIndex - b.orderIndex;
      });
    }

    function relaxCalloutSpacing(plans, selected, minTargetX, preferredTargetX, minTargetGap) {
      for (let pass = 0; pass < 3; pass++) {
        selected = selected.map((current, index) => {
          const others = selected.filter((_, otherIndex) => otherIndex !== index);
          const nearest = others.reduce((best, other) => Math.min(best, screenDistance(current, other)), Infinity);
          if (nearest >= minTargetGap) return current;

          const replacement = bestCalloutCandidate(plans[index], others, minTargetX, preferredTargetX, minTargetGap, 14);
          return calloutFromCandidate(plans[index].spec, replacement);
        });
      }
      return selected;
    }

    function bestCalloutCandidate(plan, selected, minTargetX, preferredTargetX, minTargetGap, spacingWeight) {
      const candidates = orderedCalloutCandidates(plan, selected, minTargetGap);
      return candidates.reduce((best, point) => {
        const score = scoreCalloutCandidate(point, plan, selected, minTargetX, preferredTargetX, minTargetGap, spacingWeight);
        return !best || score < best.score ? { ...point, score } : best;
      }, null);
    }

    function orderedCalloutCandidates(plan, selected, minTargetGap) {
      const previous = selected.filter(other => Number(other.orderIndex) < Number(plan.orderIndex));
      const next = selected.filter(other => Number(other.orderIndex) > Number(plan.orderIndex));
      const lowerBound = previous.length ? Math.max(...previous.map(other => other.sy)) + minTargetGap * 0.55 : -Infinity;
      const upperBound = next.length ? Math.min(...next.map(other => other.sy)) - minTargetGap * 0.55 : Infinity;
      const ordered = plan.candidates.filter(point => point.sy >= lowerBound && point.sy <= upperBound);
      if (ordered.length) return layerDepthOrderedCandidates(plan, selected, ordered);

      const looseLower = previous.length ? Math.max(...previous.map(other => other.sy)) + 2 : -Infinity;
      const looseUpper = next.length ? Math.min(...next.map(other => other.sy)) - 2 : Infinity;
      const loose = plan.candidates.filter(point => point.sy >= looseLower && point.sy <= looseUpper);
      return layerDepthOrderedCandidates(plan, selected, loose.length ? loose : plan.candidates);
    }

    function layerDepthOrderedCandidates(plan, selected, candidates) {
      if (plan.spec.kind !== "layer" || plan.spec.localLayer) return candidates;

      const previousLayer = selected
        .filter(other => other.kind === "layer" && Number(other.layer) < Number(plan.spec.layer))
        .sort((a, b) => a.layer - b.layer);
      const previous = previousLayer[previousLayer.length - 1];
      if (!previous) return candidates;

      const strict = candidates.filter(point => point.sx <= previous.sx - 10 && point.sy >= previous.sy + 2);
      if (strict.length) return strict;

      const loose = candidates.filter(point => point.sx <= previous.sx + 2 && point.sy >= previous.sy - 3);
      return loose.length ? loose : candidates;
    }

    function scoreCalloutCandidate(point, plan, selected, minTargetX, preferredTargetX, minTargetGap, spacingWeight) {
      let score = Math.abs(point.sy - plan.desiredY)
        + Math.abs(point.sx - preferredTargetX) * 0.08
        + Math.max(0, minTargetX - point.sx) * 2.5;
      const previousCandidates = selected
        .filter(other => Number(other.orderIndex) < Number(plan.orderIndex))
        .sort((a, b) => a.orderIndex - b.orderIndex);
      const previous = previousCandidates[previousCandidates.length - 1];
      const next = selected
        .filter(other => Number(other.orderIndex) > Number(plan.orderIndex))
        .sort((a, b) => a.orderIndex - b.orderIndex)[0];
      if (previous) {
        score += Math.max(0, previous.sy + 10 - point.sy) * 80;
      }
      if (next) {
        score += Math.max(0, point.sy + 10 - next.sy) * 80;
      }

      if (plan.spec.kind === "layer" && !plan.spec.localLayer) {
        const previousLayerCandidates = selected
          .filter(other => other.kind === "layer" && Number(other.layer) < Number(plan.spec.layer))
          .sort((a, b) => a.layer - b.layer);
        const previousLayer = previousLayerCandidates[previousLayerCandidates.length - 1];
        if (previousLayer) {
          score += Math.max(0, point.sx - (previousLayer.sx - 10)) * 45;
          score += Math.max(0, previousLayer.sy + 2 - point.sy) * 45;
        }
      }

      selected.forEach(other => {
        const distance = screenDistance(point, other);
        const gap = Math.max(0, minTargetGap - distance);
        const yGap = Math.max(0, 12 - Math.abs(point.sy - other.sy));
        score += gap * gap * spacingWeight;
        score += yGap * yGap * spacingWeight * 0.6;
        if (String(point.nodeIndex) === String(other.nodeIndex) && distance < minTargetGap * 1.6) {
          score += spacingWeight * 75;
        }
      });

      return score;
    }

    function calloutFromCandidate(spec, point) {
      return {
        label: spec.label,
        color: spec.color,
        focusKey: geometryFocusKey(spec.kind, spec.layer),
        kind: spec.kind,
        layer: spec.layer,
        localLayer: spec.localLayer,
        coverageRatio: spec.coverageRatio,
        spanCount: spec.spanCount,
        depth: spec.depth,
        orderIndex: spec.orderIndex,
        x: point.x,
        y: point.y,
        sx: point.sx,
        sy: point.sy,
        nodeIndex: point.nodeIndex
      };
    }

    function screenDistance(a, b) {
      return Math.hypot(Number(a.sx) - Number(b.sx), Number(a.sy) - Number(b.sy));
    }
