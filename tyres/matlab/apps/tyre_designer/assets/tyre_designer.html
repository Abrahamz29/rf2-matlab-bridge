<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tyre_designer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1317;
      --panel: #171c22;
      --panel-2: #202731;
      --line: #303944;
      --text: #e6edf3;
      --muted: #9aa7b3;
      --accent: #4fb3ff;
      --warn: #e0a84f;
      --rubber: #f0b85a;
      --bulk: #78d3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.42 "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-rows: 58px 38px 1fr 30px;
      height: 100vh;
      min-width: 920px;
    }
    header {
      display: grid;
      grid-template-columns: 126px minmax(170px, 330px) minmax(130px, 220px) 44px minmax(260px, 1fr) 86px 108px;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #12171d;
    }
    h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 700;
    }
    .pill, .status {
      min-width: 0;
      height: 31px;
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #0b0f13;
      color: var(--muted);
      padding: 0 9px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .status {
      color: var(--warn);
      justify-content: center;
      font-size: 12px;
    }
    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-align: right;
    }
    select, button, input[type="search"] {
      height: 31px;
      background: #0b0f13;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 5px;
      font: inherit;
    }
    select {
      width: 100%;
      padding: 4px 8px;
    }
    input[type="search"] {
      width: 100%;
      padding: 4px 9px;
      outline: none;
    }
    input[type="search"]:focus {
      border-color: var(--accent);
    }
    button {
      background: var(--panel-2);
      cursor: pointer;
    }
    button:hover, select:hover {
      border-color: var(--accent);
    }
    .view-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #10151a;
    }
    .view-tab {
      height: 28px;
      min-width: 106px;
      padding: 0 14px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-weight: 650;
    }
    .view-tab:hover {
      border-color: var(--line);
      color: var(--text);
    }
    .view-tab.active {
      border-color: var(--accent);
      background: #142231;
      color: var(--text);
    }
    main {
      overflow: auto;
      padding: 14px;
    }
    .view-page[hidden] {
      display: none !important;
    }
    .geometry-page {
      display: grid;
      grid-template-rows: auto minmax(360px, 1fr);
      gap: 12px;
      min-height: 100%;
    }
    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .page-head h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(112px, 1fr));
      gap: 8px;
      width: min(900px, 100%);
    }
    .metric {
      min-height: 52px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .metric .value {
      font-size: 18px;
      font-weight: 700;
    }
    .metric .label {
      margin-top: 1px;
      color: var(--muted);
      font-size: 11px;
    }
    .plot-panel {
      display: grid;
      grid-template-rows: auto minmax(320px, 1fr);
      gap: 8px;
      min-height: 360px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
    }
    .plot-toolbar {
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      color: var(--muted);
    }
    .plot-toolbar label {
      min-width: 86px;
      color: var(--text);
      text-align: left;
    }
    .plot-toolbar .toggle {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-weight: 650;
      cursor: pointer;
    }
    .plot-toolbar input[type="checkbox"] {
      accent-color: var(--accent);
    }
    .plot-toolbar input[type="range"] {
      width: min(320px, 36vw);
      accent-color: var(--accent);
    }
    .plot-toolbar input[type="range"]:disabled {
      opacity: 0.42;
    }
    .plot-toolbar output {
      min-width: 28px;
      color: #b9d8f2;
      font-weight: 700;
      text-align: right;
    }
    .model-plot {
      display: block;
      width: 100%;
      height: calc(100vh - 248px);
      min-height: 320px;
      background: #0b0f12;
      border: 1px solid var(--line);
      border-radius: 5px;
    }
    .node-explorer-page {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      height: calc(100vh - 154px);
      min-height: 0;
    }
    .materials-page {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      height: calc(100vh - 154px);
      min-height: 0;
    }
    .materials-workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(300px, 0.82fr) minmax(560px, 2fr);
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      overflow: hidden;
    }
    .materials-browser {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr);
      gap: 9px;
      overflow: hidden;
    }
    .materials-browser-head,
    .materials-plot-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .materials-browser-head h3,
    .materials-plot-head h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
    }
    .materials-browser-meta,
    .materials-plot-meta {
      color: var(--muted);
      font-size: 10px;
      text-align: right;
    }
    .material-filter {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 6px;
      align-items: center;
    }
    .material-filter button {
      min-width: 74px;
      padding: 0 9px;
      font-size: 11px;
    }
    .material-category-actions {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 10px;
    }
    .material-category-actions button {
      min-width: 58px;
      height: 24px;
      padding: 0 8px;
      font-size: 11px;
    }
    .material-category-list {
      min-height: 0;
      max-height: none;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      overflow: visible;
      padding-right: 2px;
    }
    .material-category-option {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      padding: 5px 7px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #0b0f12;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }
    .material-category-option input,
    .material-row input {
      accent-color: var(--accent);
    }
    .material-category-option .name,
    .material-row .name {
      min-width: 0;
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 700;
    }
    .material-category-option .count,
    .material-row .meta,
    .material-row .range {
      display: block;
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }
    .material-list {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 5px;
      padding-right: 2px;
    }
    .material-row {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #0b0f12;
      cursor: pointer;
    }
    .material-row.selected {
      border-color: var(--accent);
      background: #102032;
    }
    .material-row .details {
      min-width: 0;
      display: grid;
      gap: 1px;
    }
    .material-row .swatch {
      width: 9px;
      height: 28px;
      border-radius: 3px;
      border: 1px solid #0b0f12;
    }
    .materials-plot-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 9px;
      overflow: hidden;
    }
    .materials-selection-summary {
      min-height: 35px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: start;
      overflow: hidden;
    }
    .materials-selected-chip {
      min-width: 0;
      max-width: 230px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 7px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #0b0f12;
      color: #dceaf7;
      font-size: 11px;
      font-weight: 700;
    }
    button.materials-selected-chip {
      cursor: pointer;
      font: inherit;
    }
    button.materials-selected-chip:hover {
      border-color: var(--accent);
      background: #102032;
    }
    .materials-selected-chip .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex: none;
    }
    .materials-selected-chip .text {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .materials-plot-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
      overflow: hidden;
    }
    .materials-empty {
      min-height: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #0b0f12;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 18px;
      text-align: center;
    }
    .node-explorer-grid {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) minmax(360px, 1fr);
      grid-template-rows: minmax(0, 0.47fr) minmax(0, 0.53fr);
      gap: 12px;
      min-height: 0;
      height: 100%;
    }
    .node-overview-panel {
      grid-column: 1;
      grid-row: 1;
      min-width: 0;
      min-height: 0;
    }
    .node-explorer-plot {
      height: 100%;
      min-height: 0;
    }
    .node-explorer-plot:focus {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }
    .node-detail-panel {
      grid-column: 1;
      grid-row: 2;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
    }
    .node-detail-head {
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .node-detail-head h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
    }
    .node-detail-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }
    .node-display-toggles {
      display: inline-grid;
      grid-auto-flow: column;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 5px;
      overflow: hidden;
      background: #0b0f13;
    }
    .node-display-toggles button {
      height: 25px;
      min-width: 52px;
      padding: 0 9px;
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .node-display-toggles button:last-child {
      border-right: 0;
    }
    .node-display-toggles button.active {
      background: #142231;
      color: var(--text);
    }
    .node-display-toggles button:not(.active) {
      opacity: 0.55;
    }
    .node-detail-tools label {
      min-width: 82px;
      color: var(--text);
      text-align: left;
    }
    .node-detail-tools input[type="range"] {
      width: min(220px, 18vw);
      accent-color: var(--accent);
    }
    .node-detail-tools output {
      min-width: 28px;
      color: #b9d8f2;
      font-weight: 700;
      text-align: right;
    }
    .node-detail-plot {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: #0b0f12;
      border: 1px solid var(--line);
      border-radius: 5px;
    }
    .material-teardown-panel {
      grid-column: 2;
      grid-row: 1 / span 2;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      overflow: hidden;
    }
    .material-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .material-head h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
    }
    .material-note {
      color: var(--muted);
      font-size: 10px;
      text-align: right;
    }
    .material-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .material-recognition {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      min-height: 26px;
    }
    .material-match-chip {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #0b0f12;
      padding: 5px 7px;
      overflow: hidden;
    }
    .material-match-chip .kind,
    .material-match-chip .name,
    .material-match-chip .meta {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .material-match-chip .kind {
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
    }
    .material-match-chip .name {
      color: #dceaf7;
      font-size: 10.5px;
      font-weight: 700;
    }
    .material-match-chip .meta {
      color: #b9d8f2;
      font-size: 9px;
    }
    .material-chip {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #0b0f12;
      padding: 6px 7px;
    }
    button.material-chip {
      cursor: pointer;
      text-align: left;
      font: inherit;
    }
    button.material-chip:hover {
      border-color: var(--accent);
    }
    .material-chip.inactive {
      opacity: 0.42;
      background: #11161b;
    }
    .material-chip .name {
      color: #dceaf7;
      font-weight: 700;
      font-size: 11px;
    }
    .material-chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(210px, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      padding-right: 2px;
    }
    .material-chart {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: #0b0f12;
      border: 1px solid var(--line);
      border-radius: 5px;
    }
    .material-series-toggle {
      cursor: pointer;
    }
    .empty-panel {
      min-height: 320px;
      background: #0b0f12;
      border: 1px solid var(--line);
      border-radius: 7px;
    }
    .axis line, .axis path {
      stroke: #617286;
      stroke-width: 1;
    }
    .axis text, .axis-label, .legend text {
      fill: #b9d8f2;
      font-size: 12px;
    }
    .callout text {
      fill: #dceaf7;
      font-size: 11px;
      font-weight: 650;
    }
    .callout {
      cursor: pointer;
    }
    .node-layer-guide {
      stroke: #dceaf7;
      stroke-width: 0.55;
      stroke-opacity: 0.3;
      stroke-dasharray: 2 3;
      pointer-events: none;
    }
    .node-label {
      fill: #e6edf3;
      font-size: 8.5px;
      font-weight: 650;
      paint-order: stroke;
      stroke: #0b0f12;
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .node-marker {
      cursor: pointer;
    }
    .node-selection-box {
      fill: #4fb3ff;
      fill-opacity: 0.14;
      stroke: #4fb3ff;
      stroke-width: 1;
      stroke-dasharray: 4 3;
      pointer-events: none;
    }
    .axis-label {
      font-size: 13px;
    }
    footer {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--line);
      padding: 0 10px;
      color: var(--muted);
      background: #12171d;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>tyre<br>designer</h1>
      <div id="file-pill" class="pill">No file</div>
      <div id="db-pill" class="status">DB</div>
      <label for="tyre-select">Tyre</label>
      <select id="tyre-select"></select>
      <button id="reload-button" type="button">Reload</button>
      <button id="ping-button" type="button">Ping MATLAB</button>
    </header>
    <nav class="view-nav" aria-label="Tyre designer views">
      <button class="view-tab active" type="button" data-view="model">Model View</button>
      <button class="view-tab" type="button" data-view="node-explorer">Node Explorer</button>
      <button class="view-tab" type="button" data-view="materials">Materials</button>
    </nav>
    <main>
      <section id="model-view" class="geometry-page view-page">
        <div class="page-head">
          <h2>Geometry</h2>
          <div id="metrics" class="metrics"></div>
        </div>
        <div class="plot-panel">
          <div class="plot-toolbar" aria-label="Geometry view controls">
            <label for="layer-explode-slider">Layer spread</label>
            <input id="layer-explode-slider" type="range" min="0" max="100" step="1" value="0" />
            <label class="toggle" for="layer-explode-enabled">
              <input id="layer-explode-enabled" type="checkbox" checked />
              On
            </label>
            <output id="layer-explode-value" for="layer-explode-slider">0</output>
          </div>
          <svg id="geometry-plot" class="model-plot" viewBox="0 0 1100 520" preserveAspectRatio="none" aria-label="Tyre geometry plot"></svg>
        </div>
      </section>
      <section id="node-explorer-view" class="node-explorer-page view-page" hidden>
        <div class="page-head">
          <h2>Node Explorer</h2>
        </div>
        <div class="node-explorer-grid">
          <div class="node-overview-panel">
            <svg id="node-explorer-plot" class="model-plot node-explorer-plot" viewBox="0 0 1100 520" preserveAspectRatio="none" tabindex="0" aria-label="Node explorer tyre overview"></svg>
          </div>
          <div class="node-detail-panel">
            <div class="node-detail-head">
              <h3 id="node-detail-title">Node</h3>
              <div class="node-detail-tools" aria-label="Node detail controls">
                <div class="node-display-toggles" aria-label="Node section display">
                  <button type="button" data-node-display-target="layers" aria-pressed="true">Layer</button>
                  <button type="button" data-node-display-target="rest" aria-pressed="true">Rest</button>
                </div>
                <label for="node-layer-spread-slider">Node spread</label>
                <input id="node-layer-spread-slider" type="range" min="0" max="100" step="1" value="100" />
                <output id="node-layer-spread-value" for="node-layer-spread-slider">100</output>
              </div>
            </div>
            <svg id="node-detail-plot" class="node-detail-plot" viewBox="0 0 720 260" preserveAspectRatio="none" aria-label="Selected node layer slice"></svg>
          </div>
          <div class="material-teardown-panel">
            <div class="material-head">
              <h3 id="node-material-title">Material teardown</h3>
              <div id="node-material-note" class="material-note"></div>
            </div>
            <div id="node-material-summary" class="material-summary"></div>
            <div id="node-material-recognition" class="material-recognition"></div>
            <div class="material-chart-grid">
              <svg id="material-young-chart" class="material-chart" viewBox="0 0 320 240" preserveAspectRatio="none" aria-label="Young modulus by temperature"></svg>
              <svg id="material-density-chart" class="material-chart" viewBox="0 0 320 240" preserveAspectRatio="none" aria-label="Density by temperature"></svg>
              <svg id="material-heat-chart" class="material-chart" viewBox="0 0 320 240" preserveAspectRatio="none" aria-label="Specific heat by temperature"></svg>
              <svg id="material-conductivity-chart" class="material-chart" viewBox="0 0 320 240" preserveAspectRatio="none" aria-label="Conductivity by temperature"></svg>
              <svg id="material-dimensionless-chart" class="material-chart" viewBox="0 0 320 240" preserveAspectRatio="none" aria-label="Dimensionless material properties"></svg>
            </div>
          </div>
        </div>
      </section>
      <section id="materials-view" class="materials-page view-page" hidden>
        <div class="page-head">
          <h2>Materials</h2>
        </div>
        <div id="materials-workspace" class="materials-workspace"></div>
      </section>
    </main>
    <footer id="message">Ready.</footer>
  </div>

  <script>
    let matlabComponent = null;
    let state = null;
    let materialRecognitionCache = null;
    let responsivePlotObserver = null;
    let responsivePlotTimer = null;
    const responsiveObservedSvgs = new WeakSet();
    const plotHitMaps = new Map();
    const materialHiddenSeries = new Set();
    const materialKindFilters = new Set(["TreadMaterial", "BulkMaterial", "PlyMaterial"]);
    const nodeSelectionDrag = { active: false, dragging: false, plotId: "", start: null, current: null, additive: false, suppressClick: false };
    const viewState = { currentView: "model", layerExplode: 0, layerExplodeEnabled: true, nodeLayerSpread: 100, nodeShowLayers: true, nodeShowRest: true, selectedNodeIndex: null, selectedNodeIndices: [], focusKey: "", materialSearch: "", materialCategories: null, selectedMaterialIds: null, materialListScrollTop: 0 };
    const LAYER_EXPLODE_TARGET_MM = 30;
    const NODE_LAYER_SPREAD_TARGET_MM = 30;
    const NODE_REST_SPREAD_TARGET_MM = 30;
    const NODE_SLICE_LABEL_MIN_GAP_PX = 4;
    const MATERIAL_RECOGNITION_TOP_N = 5;
    const COLORS = ["#e7eef5", "#72b7ff", "#6be675", "#f07d9d", "#b99cff", "#8ce3df", "#f0b85a", "#ff7a45"];

    function setup(htmlComponent) {
      matlabComponent = htmlComponent;
      state = htmlComponent.Data;
      viewState.currentView = normalizeViewName(state?.startView || viewState.currentView);
      bindControls();
      bindResponsivePlotSizing();
      render();
      htmlComponent.addEventListener("DataChanged", () => {
        const incoming = htmlComponent.Data;
        if (incoming?.kind === "pong") {
          setMessage(incoming.message || "MATLAB backend ready");
          return;
        }
        state = incoming;
        materialRecognitionCache = null;
        viewState.currentView = normalizeViewName(state?.startView || viewState.currentView);
        render();
      });
    }

    function bindControls() {
      document.getElementById("tyre-select").addEventListener("change", event => {
        const path = event.target.value || "";
        if (!path || !matlabComponent) return;
        setMessage("loading " + (event.target.selectedOptions?.[0]?.textContent || path));
        matlabComponent.Data = { command: "loadTgm", path, startView: viewState.currentView };
      });
      document.getElementById("reload-button").addEventListener("click", () => {
        if (matlabComponent && state?.inputPath) {
          setMessage("reloading " + state.inputPath);
          matlabComponent.Data = { command: "loadTgm", path: state.inputPath, startView: viewState.currentView };
        }
      });
      document.getElementById("ping-button").addEventListener("click", () => {
        if (matlabComponent) matlabComponent.Data = { command: "ping" };
      });
      document.getElementById("layer-explode-slider").addEventListener("input", event => {
        viewState.layerExplode = clamp(Number(event.target.value), 0, 100);
        updateLayerExplodeReadout();
        renderCurrentView();
      });
      document.getElementById("layer-explode-enabled").addEventListener("change", event => {
        viewState.layerExplodeEnabled = event.target.checked;
        updateLayerExplodeReadout();
        renderCurrentView();
      });
      document.getElementById("node-layer-spread-slider").addEventListener("input", event => {
        viewState.nodeLayerSpread = clamp(Number(event.target.value), 0, 100);
        updateNodeLayerSpreadReadout();
        drawNodeExplorer();
      });
      document.querySelectorAll("[data-node-display-target]").forEach(button => {
        button.addEventListener("click", () => {
          toggleNodeDisplayTarget(button.dataset.nodeDisplayTarget);
          updateNodeDisplayControls();
          drawNodeExplorer();
        });
      });
      document.addEventListener("click", event => {
        const kindTarget = event.target.closest("[data-material-kind-filter]");
        if (kindTarget) {
          toggleMaterialKindFilter(kindTarget.dataset.materialKindFilter || "");
          drawMaterialTeardown();
          return;
        }
        const target = event.target.closest("[data-material-series-key]");
        if (!target) return;
        toggleMaterialSeries(target.dataset.materialChartKey || "", target.dataset.materialSeriesKey || "");
      });
      const materialsWorkspace = document.getElementById("materials-workspace");
      materialsWorkspace.addEventListener("input", handleMaterialsWorkspaceInput);
      materialsWorkspace.addEventListener("change", handleMaterialsWorkspaceChange);
      materialsWorkspace.addEventListener("click", handleMaterialsWorkspaceClick);
      ["geometry-plot", "node-explorer-plot"].forEach(plotId => {
        document.getElementById(plotId).addEventListener("click", event => {
          if (plotId === "node-explorer-plot") event.currentTarget.focus();
          if (nodeSelectionDrag.suppressClick) {
            nodeSelectionDrag.suppressClick = false;
            return;
          }
          const nodeTarget = event.target.closest("[data-node-index]");
          if (nodeTarget) {
            handleNodeClickSelection(Number(nodeTarget.dataset.nodeIndex), event);
            return;
          }
          const target = event.target.closest("[data-focus-key]");
          if (!target && plotId === "node-explorer-plot") {
            const nodeIndex = nearestNodeFromEvent(event, plotId);
            if (Number.isFinite(nodeIndex)) {
              handleNodeClickSelection(nodeIndex, event);
              return;
            }
          }
          toggleGeometryFocus(target?.dataset?.focusKey || "");
        });
      });
      const nodeExplorerPlot = document.getElementById("node-explorer-plot");
      nodeExplorerPlot.addEventListener("pointerdown", beginNodeSelectionDrag);
      nodeExplorerPlot.addEventListener("pointermove", updateNodeSelectionDrag);
      nodeExplorerPlot.addEventListener("pointerup", finishNodeSelectionDrag);
      nodeExplorerPlot.addEventListener("pointercancel", cancelNodeSelectionDrag);
      nodeExplorerPlot.addEventListener("pointerleave", finishNodeSelectionDrag);
      nodeExplorerPlot.addEventListener("keydown", handleNodeExplorerKeydown);
      document.querySelectorAll("[data-view]").forEach(button => {
        button.addEventListener("click", () => {
          setCurrentView(button.dataset.view || "model");
        });
      });
    }

    function bindResponsivePlotSizing() {
      if (responsivePlotObserver || typeof ResizeObserver === "undefined") {
        window.addEventListener("resize", queueResponsivePlotRender);
        return;
      }
      responsivePlotObserver = new ResizeObserver(queueResponsivePlotRender);
      window.addEventListener("resize", queueResponsivePlotRender);
      observeResponsiveSvgs();
    }

    function observeResponsiveSvgs() {
      if (!responsivePlotObserver) return;
      document.querySelectorAll(".model-plot, .node-detail-plot, .material-chart").forEach(svg => {
        if (!responsiveObservedSvgs.has(svg)) {
          responsiveObservedSvgs.add(svg);
          responsivePlotObserver.observe(svg);
        }
      });
    }

    function queueResponsivePlotRender() {
      if (responsivePlotTimer !== null) return;
      responsivePlotTimer = setTimeout(() => {
        responsivePlotTimer = null;
        if (state) renderCurrentView();
      }, 80);
    }

    function syncSvgViewBox(svg, fallbackWidth = 320, fallbackHeight = 180) {
      if (!svg) return { width: fallbackWidth, height: fallbackHeight };
      const rect = svg.getBoundingClientRect();
      const current = svg.viewBox?.baseVal;
      const width = Math.max(80, Math.round(rect.width || svg.clientWidth || current?.width || fallbackWidth));
      const height = Math.max(60, Math.round(rect.height || svg.clientHeight || current?.height || fallbackHeight));
      const next = `0 0 ${width} ${height}`;
      if (svg.getAttribute("viewBox") !== next) svg.setAttribute("viewBox", next);
      return { width, height };
    }

    function render() {
      if (!state) return;
      if (state.kind === "error") {
        setMessage(state.message || "Error.");
        return;
      }
      document.getElementById("file-pill").textContent = state.inputPath || "No file";
      document.getElementById("db-pill").textContent = `${state.database?.available ? "DB" : "Cache"} ${state.tyres?.length || 0}`;
      setMessage(state.message || state.status || "Ready.");
      renderTyres();
      renderMetrics();
      updateLayerExplodeReadout();
      updateNodeLayerSpreadReadout();
      renderCurrentView();
    }

    function renderTyres() {
      const select = document.getElementById("tyre-select");
      const tyres = state?.tyres || [];
      const selected = tyres.find(item => item.selected === true);
      const currentPath = selected?.path || state?.inputPath || "";
      select.disabled = tyres.length === 0;
      select.innerHTML = `<option value="">Select tyre...</option>${tyres.map(item => {
        const selectedAttr = item.path === currentPath || item.selected ? "selected" : "";
        return `<option value="${escapeAttr(item.path)}" ${selectedAttr}>${escapeHtml(item.displayName || item.fileName || item.path)}</option>`;
      }).join("")}`;
      if (currentPath) select.value = currentPath;
    }

    function setCurrentView(viewName) {
      viewState.currentView = normalizeViewName(viewName);
      renderCurrentView();
      if (viewState.currentView === "node-explorer") {
        setTimeout(() => document.getElementById("node-explorer-plot")?.focus(), 0);
      }
    }

    function normalizeViewName(viewName) {
      const value = String(viewName || "").trim().toLowerCase().replace(/[_\s]+/g, "-");
      if (["node", "nodes", "node-explorer", "nodeexplorer"].includes(value)) return "node-explorer";
      if (["material", "materials"].includes(value)) return "materials";
      return "model";
    }

    function renderCurrentView() {
      const isModel = viewState.currentView === "model";
      const isNodeExplorer = viewState.currentView === "node-explorer";
      const isMaterials = viewState.currentView === "materials";
      document.getElementById("model-view").hidden = !isModel;
      document.getElementById("node-explorer-view").hidden = !isNodeExplorer;
      document.getElementById("materials-view").hidden = !isMaterials;
      document.querySelectorAll("[data-view]").forEach(button => {
        const active = button.dataset.view === viewState.currentView;
        button.classList.toggle("active", active);
        button.setAttribute("aria-current", active ? "page" : "false");
      });
      if (isModel) {
        drawGeometry();
      } else if (isNodeExplorer) {
        drawNodeExplorer();
      } else {
        drawMaterialsPage();
      }
      observeResponsiveSvgs();
    }

    function drawMaterialsPage(options = {}) {
      const workspace = document.getElementById("materials-workspace");
      if (!workspace) return;
      if (options.preserveScroll !== false) rememberMaterialScrollPositions();
      const library = materialLibraryData();
      if (!library.available) {
        workspace.innerHTML = `<div class="materials-empty">${escapeHtml(library.message || "Material database unavailable.")}<br>${escapeHtml(library.path || "")}</div>`;
        return;
      }

      const materials = materialLibraryMaterials();
      const categories = materialLibraryCategories();
      ensureMaterialBrowserState(materials, categories);
      const filtered = filteredMaterialLibraryMaterials(materials);
      const selected = selectedLibraryMaterials(materials);
      const selectedIds = new Set(selected.map(material => Number(material.id)));
      const selectedCategories = new Set(viewState.materialCategories || []);
      const categoryStatus = `${selectedCategories.size}/${categories.length} categories`;
      const selectedLabel = selected.length
        ? `${selected.length} selected`
        : "No material selected";
      workspace.innerHTML = `
        <aside class="materials-browser" aria-label="Material database browser">
          <div class="materials-browser-head">
            <h3>Material database</h3>
            <div class="materials-browser-meta">${escapeHtml(materials.length)} materials / ${escapeHtml(library.pointCount || 0)} pts | ${escapeHtml(categoryStatus)}</div>
          </div>
          <div class="material-filter">
            <input id="material-search" type="search" value="${escapeAttr(viewState.materialSearch || "")}" placeholder="Filter materials" aria-label="Filter materials" />
            <button type="button" data-material-action="select-filtered">Select</button>
            <button type="button" data-material-action="clear-selection">Clear</button>
          </div>
          <div class="material-category-actions">
            <span>Category filter</span>
            <button type="button" data-material-action="categories-all">All</button>
            <button type="button" data-material-action="categories-none">None</button>
          </div>
          <div class="material-category-list" aria-label="Material categories">
            ${categories.map(category => `
              <label class="material-category-option">
                <input type="checkbox" data-material-category="${escapeAttr(category.name)}" ${selectedCategories.has(String(category.name)) ? "checked" : ""} />
                <span class="name">${escapeHtml(category.name)}</span>
                <span class="count">${escapeHtml(category.materialCount || 0)}</span>
              </label>
            `).join("")}
          </div>
          <div id="material-list" class="material-list" aria-label="Materials">
            ${filtered.length ? filtered.map((material, index) => materialListRowHtml(material, selectedIds.has(Number(material.id)), materialLibraryColor(index))).join("") : `<div class="materials-empty">${selectedCategories.size ? "No materials match the filter." : "No categories selected."}</div>`}
          </div>
        </aside>
        <section class="materials-plot-panel" aria-label="Material temperature plots">
          <div class="materials-plot-head">
            <h3>Temperature behaviour</h3>
            <div class="materials-plot-meta">${escapeHtml(selectedLabel)}</div>
          </div>
          <div class="materials-selection-summary">
            ${selected.length ? selected.map((material, index) => `
              <button type="button" class="materials-selected-chip" data-selected-material-id="${escapeAttr(material.id)}" title="Remove ${escapeAttr(material.name)}">
                <span class="dot" style="background:${materialLibraryColor(index)}"></span>
                <span class="text">${escapeHtml(material.name)}</span>
              </button>
            `).join("") : `<div class="materials-selected-chip"><span class="text">Use the browser filter and select materials.</span></div>`}
          </div>
          <div class="materials-plot-grid material-chart-grid">
            <svg id="materials-young-chart" class="material-chart" viewBox="0 0 420 245" preserveAspectRatio="none" aria-label="Young modulus by temperature"></svg>
            <svg id="materials-density-chart" class="material-chart" viewBox="0 0 420 245" preserveAspectRatio="none" aria-label="Density by temperature"></svg>
            <svg id="materials-heat-chart" class="material-chart" viewBox="0 0 420 245" preserveAspectRatio="none" aria-label="Specific heat by temperature"></svg>
            <svg id="materials-conductivity-chart" class="material-chart" viewBox="0 0 420 245" preserveAspectRatio="none" aria-label="Conductivity by temperature"></svg>
            <svg id="materials-ratio-chart" class="material-chart" viewBox="0 0 420 245" preserveAspectRatio="none" aria-label="Poisson and compression by temperature"></svg>
            <svg id="materials-shore-chart" class="material-chart" viewBox="0 0 420 245" preserveAspectRatio="none" aria-label="Shore A by temperature"></svg>
          </div>
        </section>`;
      drawMaterialsLibraryPlots(selected);
      restoreMaterialScrollPositions(options);
      if (options.focusSearch) {
        const search = document.getElementById("material-search");
        if (search) {
          search.focus();
          const cursor = String(search.value || "").length;
          search.setSelectionRange(cursor, cursor);
        }
      }
    }

    function handleMaterialsWorkspaceInput(event) {
      if (event.target?.id !== "material-search") return;
      viewState.materialSearch = event.target.value || "";
      drawMaterialsPage({ focusSearch: true });
    }

    function handleMaterialsWorkspaceChange(event) {
      const category = event.target?.dataset?.materialCategory;
      if (category) {
        setMaterialCategory(category, event.target.checked);
        drawMaterialsPage({ preserveScroll: false });
        return;
      }
      const materialId = event.target?.dataset?.materialId;
      if (materialId) {
        toggleMaterialSelection(Number(materialId), event.target.checked);
        drawMaterialsPage({ preserveScroll: true });
      }
    }

    function handleMaterialsWorkspaceClick(event) {
      const action = event.target.closest("[data-material-action]")?.dataset?.materialAction;
      if (action === "select-filtered") {
        viewState.selectedMaterialIds = filteredMaterialLibraryMaterials(materialLibraryMaterials()).map(material => Number(material.id));
        drawMaterialsPage({ preserveScroll: true });
        return;
      }
      if (action === "clear-selection") {
        viewState.selectedMaterialIds = [];
        drawMaterialsPage({ preserveScroll: true });
        return;
      }
      if (action === "categories-all") {
        viewState.materialCategories = materialLibraryCategories().map(category => category.name);
        drawMaterialsPage({ preserveScroll: false });
        return;
      }
      if (action === "categories-none") {
        viewState.materialCategories = [];
        drawMaterialsPage({ preserveScroll: false });
        return;
      }
      const selectedChip = event.target.closest("[data-selected-material-id]");
      if (selectedChip) {
        toggleMaterialSelection(Number(selectedChip.dataset.selectedMaterialId), false);
        drawMaterialsPage({ preserveScroll: true });
        return;
      }
      const row = event.target.closest("[data-material-row-id]");
      if (!row || event.target.closest("input")) return;
      const materialId = Number(row.dataset.materialRowId);
      const selected = !(viewState.selectedMaterialIds || []).map(Number).includes(materialId);
      toggleMaterialSelection(materialId, selected);
      drawMaterialsPage({ preserveScroll: true });
    }

    function rememberMaterialScrollPositions() {
      const list = document.getElementById("material-list");
      if (list) viewState.materialListScrollTop = Number(list.scrollTop) || 0;
    }

    function restoreMaterialScrollPositions(options = {}) {
      const list = document.getElementById("material-list");
      if (!list) return;
      if (options.preserveScroll === false) {
        viewState.materialListScrollTop = 0;
      }
      const maxScroll = Math.max(0, list.scrollHeight - list.clientHeight);
      list.scrollTop = clamp(Number(viewState.materialListScrollTop) || 0, 0, maxScroll);
    }

    function materialLibraryData() {
      return state?.materialLibrary || { available: false, message: "Material database unavailable.", materials: [], categories: [] };
    }

    function materialLibraryMaterials() {
      return asArray(materialLibraryData().materials)
        .filter(material => Number.isFinite(Number(material.id)))
        .map(material => ({ ...material, id: Number(material.id), points: asArray(material.points) }));
    }

    function materialLibraryCategories() {
      return asArray(materialLibraryData().categories)
        .filter(category => String(category.name || "").trim() !== "")
        .map(category => ({ ...category, name: String(category.name), materialCount: Number(category.materialCount) || 0 }));
    }

    function ensureMaterialBrowserState(materials, categories) {
      const categoryNames = categories.map(category => category.name);
      if (!Array.isArray(viewState.materialCategories)) {
        viewState.materialCategories = categoryNames.slice();
      } else {
        const valid = new Set(categoryNames);
        viewState.materialCategories = viewState.materialCategories.filter(category => valid.has(category));
      }
      if (!Array.isArray(viewState.selectedMaterialIds)) {
        viewState.selectedMaterialIds = [];
      } else {
        const validIds = new Set(materials.map(material => Number(material.id)));
        viewState.selectedMaterialIds = viewState.selectedMaterialIds.map(Number).filter(id => validIds.has(id));
      }
    }

    function filteredMaterialLibraryMaterials(materials = materialLibraryMaterials()) {
      const selectedCategories = new Set(viewState.materialCategories || []);
      const query = String(viewState.materialSearch || "").trim().toLowerCase();
      return materials.filter(material => {
        if (!selectedCategories.has(String(material.category || ""))) return false;
        if (!query) return true;
        return [material.name, material.title, material.category].some(value => String(value || "").toLowerCase().includes(query));
      });
    }

    function selectedLibraryMaterials(materials = materialLibraryMaterials()) {
      const selectedIds = new Set((viewState.selectedMaterialIds || []).map(Number));
      return materials.filter(material => selectedIds.has(Number(material.id)));
    }

    function setMaterialCategory(category, checked) {
      const selected = new Set(viewState.materialCategories || []);
      if (checked) selected.add(String(category));
      else selected.delete(String(category));
      viewState.materialCategories = Array.from(selected);
    }

    function toggleMaterialSelection(materialId, selected) {
      const ids = new Set((viewState.selectedMaterialIds || []).map(Number));
      if (selected) ids.add(Number(materialId));
      else ids.delete(Number(materialId));
      viewState.selectedMaterialIds = Array.from(ids);
    }

    function materialListRowHtml(material, selected, color) {
      return `
        <label class="material-row ${selected ? "selected" : ""}" data-material-row-id="${escapeAttr(material.id)}">
          <input type="checkbox" data-material-id="${escapeAttr(material.id)}" ${selected ? "checked" : ""} />
          <span class="details">
            <span class="name">${escapeHtml(material.name)}</span>
            <span class="meta">${escapeHtml(material.category)} | ${escapeHtml(material.pointCount || 0)} pts | ${escapeHtml(materialTemperatureRangeText(material))}</span>
            <span class="range">${escapeHtml(materialModulusRangeText(material))}</span>
          </span>
          <span class="swatch" style="background:${color}"></span>
        </label>`;
    }

    function drawMaterialsLibraryPlots(materials) {
      const charts = {
        young: document.getElementById("materials-young-chart"),
        density: document.getElementById("materials-density-chart"),
        heat: document.getElementById("materials-heat-chart"),
        conductivity: document.getElementById("materials-conductivity-chart"),
        ratio: document.getElementById("materials-ratio-chart"),
        shore: document.getElementById("materials-shore-chart")
      };
      if (!materials.length) {
        Object.values(charts).forEach(svg => drawMaterialEmptyChart(svg, "Material data", "No material selected"));
        return;
      }
      drawMaterialTrendChart(charts.young, "Young's modulus", materialLibraryPropertySeries(materials, "youngsModulusPa", value => value / 1e6, "MPa"), "MPa", "library-young");
      drawMaterialTrendChart(charts.density, "Density", materialLibraryPropertySeries(materials, "densityKgM3", value => value, "kg/m3"), "kg/m3", "library-density");
      drawMaterialTrendChart(charts.heat, "Specific heat", materialLibraryPropertySeries(materials, "specificHeat", value => value, "J/kgK"), "J/kgK", "library-heat");
      drawMaterialTrendChart(charts.conductivity, "Conductivity", materialLibraryConductivitySeries(materials), "W/mK", "library-conductivity");
      drawMaterialTrendChart(charts.ratio, "Poisson / Compression", materialLibraryDimensionlessSeries(materials), "-", "library-ratio");
      drawMaterialTrendChart(charts.shore, "Shore A", materialLibraryPropertySeries(materials, "shoreA", value => value, "Shore A"), "Shore A", "library-shore");
    }

    function materialLibraryPropertySeries(materials, field, convert, unit) {
      return materials.map((material, index) => {
        const color = materialLibraryColor(index);
        const points = materialLibraryPoints(material, field, convert, unit, material.name);
        return {
          key: `material-${material.id}-${field}`,
          label: materialShortLabel(material),
          color,
          dash: "",
          points
        };
      }).filter(series => series.points.length);
    }

    function materialLibraryConductivitySeries(materials) {
      return materials.flatMap((material, index) => {
        const color = materialLibraryColor(index);
        return [
          {
            key: `material-${material.id}-thermalConductivity`,
            label: `${materialShortLabel(material)} k`,
            color,
            dash: "",
            points: materialLibraryPoints(material, "thermalConductivity", value => value, "W/mK", `${material.name} conductivity`)
          },
          {
            key: `material-${material.id}-longitudinalConductivity`,
            label: `${materialShortLabel(material)} kL`,
            color,
            dash: "4 2",
            points: materialLibraryPoints(material, "longitudinalConductivity", value => value, "W/mK", `${material.name} longitudinal conductivity`)
          }
        ];
      }).filter(series => series.points.length);
    }

    function materialLibraryDimensionlessSeries(materials) {
      return materials.flatMap((material, index) => {
        const color = materialLibraryColor(index);
        return [
          {
            key: `material-${material.id}-poissonsRatio`,
            label: `${materialShortLabel(material)} v`,
            color,
            dash: "",
            points: materialLibraryPoints(material, "poissonsRatio", value => value, "-", `${material.name} Poisson`)
          },
          {
            key: `material-${material.id}-compressionTensionRatio`,
            label: `${materialShortLabel(material)} c/t`,
            color,
            dash: "3 2",
            points: materialLibraryPoints(material, "compressionTensionRatio", value => value, "-", `${material.name} compression/tension`)
          }
        ];
      }).filter(series => series.points.length);
    }

    function materialLibraryPoints(material, field, convert, unit, titlePrefix) {
      return mergeMaterialSeriesPoints(asArray(material.points).map(point => {
        const raw = Number(point[field]);
        const value = Number.isFinite(raw) ? convert(raw) : NaN;
        const tempC = temperatureC(point);
        return {
          x: tempC,
          y: value,
          title: `${titlePrefix} ${fmt(tempC)} C: ${fmt(value)} ${unit}`
        };
      }).filter(point => Number.isFinite(point.x) && Number.isFinite(point.y)));
    }

    function materialTemperatureRangeText(material) {
      const values = asArray(material.points).map(temperatureC).filter(Number.isFinite);
      if (!values.length) return "temp -";
      return `${fmt(Math.min(...values))}..${fmt(Math.max(...values))} C`;
    }

    function materialModulusRangeText(material) {
      const values = asArray(material.points).map(point => Number(point.youngsModulusPa) / 1e6).filter(Number.isFinite);
      if (!values.length) return "E -";
      return `E ${fmt(Math.min(...values))}..${fmt(Math.max(...values))} MPa`;
    }

    function materialShortLabel(material) {
      const words = String(material?.name || "Material")
        .replace(/[()]/g, " ")
        .split(/[\s/_-]+/)
        .filter(Boolean);
      const label = words.length > 1
        ? words.slice(0, 2).map(word => word.slice(0, 5)).join(" ")
        : String(material?.name || "Material");
      return label.length > 15 ? label.slice(0, 14) + "." : label;
    }

    function materialLibraryColor(index) {
      return COLORS[Math.abs(Number(index) || 0) % COLORS.length];
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value === null || value === undefined) return [];
      return [value];
    }

    function renderMetrics() {
      const summary = state?.summary || {};
      const plotData = state?.plotData || {};
      const tread = plotData.treadDepth || [];
      const rubber = plotData.rubberCrossSection || [];
      const treadMm = tread.map(row => Number(row.treadDepthM) * 1000).filter(Number.isFinite);
      const nodeMm = rubber.map(row => Number(row.nodeThicknessM) * 1000).filter(Number.isFinite);
      const items = [
        ["Nodes", summary.nodeCount],
        ["Ply Rows", summary.plyParamRows],
        ["Layers", summary.maxPlyLayers],
        ["Tread mm", treadMm.length ? `${fmt(Math.min(...treadMm))}..${fmt(Math.max(...treadMm))}` : "-"],
        ["Node mm", nodeMm.length ? `${fmt(Math.min(...nodeMm))}..${fmt(Math.max(...nodeMm))}` : "-"],
        ["Source", state?.database?.available ? "DB" : "Cache"]
      ];
      document.getElementById("metrics").innerHTML = items.map(([label, value]) =>
        `<div class="metric"><div class="value">${escapeHtml(value ?? "-")}</div><div class="label">${escapeHtml(label)}</div></div>`
      ).join("");
    }

    function drawGeometry() {
      drawGeometryPlot(document.getElementById("geometry-plot"));
    }

    function drawNodeExplorer() {
      drawGeometryPlot(document.getElementById("node-explorer-plot"));
      drawNodeDetail();
      drawMaterialTeardown();
    }

    function drawGeometryPlot(svg) {
      if (!svg) return;
      syncSvgViewBox(svg, 1100, 520);
      svg.innerHTML = "";
      const data = state?.plotData || {};
      const geometry = data.geometry || [];
      if (!geometry.length) {
        plotHitMaps.delete(svg.id);
        svg.insertAdjacentHTML("beforeend", `<text x="50%" y="50%" fill="#9aa7b3" text-anchor="middle">No tyre loaded</text>`);
        return;
      }

      const points = geometry.map(p => ({ ...p, xMm: Number(p.x) * 1000, yMm: Number(p.y) * 1000 }));
      const rubber = (data.rubberCrossSection || []).map(p => ({
        ...p,
        surfaceXMm: Number(p.surfaceX) * 1000,
        surfaceYMm: Number(p.surfaceY) * 1000,
        treadXMm: Number(p.treadX) * 1000,
        treadYMm: Number(p.treadY) * 1000,
        innerXMm: Number(p.innerX) * 1000,
        innerYMm: Number(p.innerY) * 1000
      }));
      const layers = (data.plyCrossSection || []).map(p => ({
        ...p,
        xMm: Number(p.x) * 1000,
        yMm: Number(p.y) * 1000,
        innerXMm: Number(p.innerX) * 1000,
        innerYMm: Number(p.innerY) * 1000,
        outerXMm: Number(p.outerX) * 1000,
        outerYMm: Number(p.outerY) * 1000
      }));
      const materials = data.materials || [];
      const xs = points.map(p => p.xMm)
        .concat(rubber.map(p => p.treadXMm))
        .concat(rubber.map(p => p.innerXMm))
        .concat(layers.map(p => p.outerXMm));
      const ys = points.map(p => p.yMm)
        .concat(rubber.map(p => p.treadYMm))
        .concat(rubber.map(p => p.innerYMm))
        .concat(layers.map(p => p.outerYMm));
      const frame = makeFrame(svg, xs, ys, true);
      const displayLayers = applyLayerExplosion(rubber, layers, layerExplodeStrength(), LAYER_EXPLODE_TARGET_MM);
      storeNodeHitMap(svg, frame, points);
      const cloneGroups = svg.id === "node-explorer-plot"
        ? nodeCloneGroups(points, rubber, layers, materials)
        : null;

      drawAxes(svg, frame, "Radial coordinate X [mm]", "Lateral coordinate Y [mm]");
      drawRubber(svg, frame, rubber);
      drawLayers(svg, frame, displayLayers);
      drawNodeLayerGuides(svg, frame, points, displayLayers);
      const shellPath = pointPath(points, frame, "xMm", "yMm");
      svg.insertAdjacentHTML("beforeend", `<path d="${shellPath}" fill="none" stroke="#dce6ef" stroke-width="1.2" opacity="${focusOpacity(geometryFocusKey("surface")).toFixed(2)}"/>`);
      points.forEach(p => {
        const marker = nodeMarkerStyle(p.nodeIndex, cloneGroups);
        svg.insertAdjacentHTML("beforeend",
          `<circle class="node-marker" data-node-index="${escapeAttr(p.nodeIndex)}" cx="${frame.sx(p.xMm).toFixed(1)}" cy="${frame.sy(p.yMm).toFixed(1)}" r="${marker.radius}" fill="${marker.fill}" stroke="${marker.stroke}" stroke-width="${marker.strokeWidth}" stroke-opacity="${marker.strokeOpacity}"><title>${escapeHtml(marker.title)}</title></circle>`);
      });
      drawNodeNumbers(svg, frame, points, displayLayers);
      drawLineCallouts(svg, frame, rubber, displayLayers);
      if (cloneGroups) drawCloneLegend(svg, cloneGroups);
      drawLegend(svg, [
        { label: "Surface", color: "#dce6ef" },
        { label: "Tread depth", color: "#f0b85a" },
        { label: "Node thickness", color: "#78d3ff" }
      ]);
    }

    function drawNodeDetail() {
      const svg = document.getElementById("node-detail-plot");
      const title = document.getElementById("node-detail-title");
      if (!svg) return;
      syncSvgViewBox(svg, 720, 260);
      svg.innerHTML = "";

      const data = state?.plotData || {};
      const geometry = data.geometry || [];
      if (!geometry.length) {
        if (title) title.textContent = "Node";
        svg.insertAdjacentHTML("beforeend", `<text x="50%" y="50%" fill="#9aa7b3" text-anchor="middle">No node selected</text>`);
        return;
      }

      const points = geometry.map(p => ({ ...p, xMm: Number(p.x) * 1000, yMm: Number(p.y) * 1000 }));
      const selectedNodes = selectedNodeIndicesOrDefault(points);
      const rubber = (data.rubberCrossSection || []).map(p => ({
        ...p,
        surfaceXMm: Number(p.surfaceX) * 1000,
        surfaceYMm: Number(p.surfaceY) * 1000,
        treadXMm: Number(p.treadX) * 1000,
        treadYMm: Number(p.treadY) * 1000,
        innerXMm: Number(p.innerX) * 1000,
        innerYMm: Number(p.innerY) * 1000
      }));
      const layers = (data.plyCrossSection || []).map(p => ({
        ...p,
        xMm: Number(p.x) * 1000,
        yMm: Number(p.y) * 1000,
        innerXMm: Number(p.innerX) * 1000,
        innerYMm: Number(p.innerY) * 1000,
        outerXMm: Number(p.outerX) * 1000,
        outerYMm: Number(p.outerY) * 1000
      }));
      const groups = buildNodeSectionGroups(selectedNodes, rubber, layers);
      if (title) title.textContent = selectedNodeLabel(selectedNodes);
      if (!groups.length) {
        svg.insertAdjacentHTML("beforeend", `<text x="50%" y="50%" fill="#9aa7b3" text-anchor="middle">No node data</text>`);
        return;
      }

      const view = svg.viewBox.baseVal;
      const w = view.width || 720;
      const h = view.height || 260;
      const margin = { left: 66, right: groups.length === 1 ? 170 : 145, top: 44, bottom: 30 };
      const yStart = margin.top + 24;
      const yEnd = h - margin.bottom - 10;
      const sectionLayout = nodeSectionLayoutMetrics(groups.length, yStart, yEnd);
      const groupGap = sectionLayout.gap;
      const groupHeight = sectionLayout.height;
      const trueMaxDepth = Math.max(1, ...groups.map(group => group.trueMaxDepthMm));
      const visibility = nodeSectionVisibility();
      const sectionX = nodeSectionXScale(groups, visibility, margin, w);
      const xAt = (offsetMm, group = null) => nodeSectionXAt(offsetMm, group, sectionX);

      svg.insertAdjacentHTML("beforeend", `<text x="${margin.left}" y="24" fill="#b9d8f2" font-size="12" font-weight="700">${escapeHtml(selectedNodeLabel(selectedNodes))} section</text>`);
      if (groups.length > 1) {
        drawNodeSectionHeaderLabels(svg, xAt, groups, margin.top + 17, sectionX);
      }

      groups.forEach((group, index) => {
        const yTop = yStart + index * (groupHeight + groupGap);
        const yBottom = yTop + groupHeight;
        const yMid = (yTop + yBottom) / 2;
        const groupLabel = selectedNodeLabel(group.nodes, 6);
        if (groupHeight >= 8) {
          const labelSize = groupHeight < 13 ? 6.5 : 8.5;
          svg.insertAdjacentHTML("beforeend", `<text x="${(margin.left - 10).toFixed(1)}" y="${(yMid + labelSize * 0.35).toFixed(1)}" fill="#b9d8f2" font-size="${labelSize}" text-anchor="end">${escapeHtml(groupLabel)}</text>`);
        }
        svg.insertAdjacentHTML("beforeend", `<line x1="${sectionX.left.toFixed(1)}" y1="${yTop.toFixed(1)}" x2="${sectionX.right.toFixed(1)}" y2="${yTop.toFixed(1)}" stroke="#617286" stroke-opacity="0.55"/>`);
        svg.insertAdjacentHTML("beforeend", `<line x1="${sectionX.left.toFixed(1)}" y1="${yBottom.toFixed(1)}" x2="${sectionX.right.toFixed(1)}" y2="${yBottom.toFixed(1)}" stroke="#617286" stroke-opacity="0.55"/>`);

        const sliceLabels = [];
        if (visibility.rest) {
          sliceLabels.push(drawNodeSliceBand(svg, xAt, yTop, yBottom, 0, group.displayTreadDepthMm, "#f0b85a", 0.2, "TD", group));
          sliceLabels.push(drawNodeSliceBand(svg, xAt, yTop, yBottom, group.displayTreadDepthMm, group.displayNodeThicknessMm, "#78d3ff", 0.13, "NT", group));
        }
        if (visibility.layers) {
          group.layerPlan.forEach(item => {
            const layer = Number(item.row.plyIndex || 1);
            const color = COLORS[(layer - 1) % COLORS.length];
            sliceLabels.push(drawNodeSliceBand(svg, xAt, yTop, yBottom, item.displayInner, item.displayOuter, color, 0.22, `L${layer}`, group));
          });
        }
        if (groups.length === 1 && groupHeight >= 34) drawNodeSliceLabels(svg, sliceLabels, yTop - 4);

        if (visibility.rest) {
          svg.insertAdjacentHTML("beforeend", `<line x1="${xAt(0, group).toFixed(1)}" y1="${(yTop - 4).toFixed(1)}" x2="${xAt(0, group).toFixed(1)}" y2="${(yBottom + 4).toFixed(1)}" stroke="#dce6ef" stroke-width="1.4"/>`);
          svg.insertAdjacentHTML("beforeend", `<circle cx="${xAt(0, group).toFixed(1)}" cy="${yMid.toFixed(1)}" r="3.6" fill="#4fb3ff" stroke="#0b0f12" stroke-width="1.1"><title>${escapeHtml(groupLabel)}</title></circle>`);
        }
      });

      if (visibility.rest) {
        svg.insertAdjacentHTML("beforeend", `<text x="${xAt(0, groups[0]).toFixed(1)}" y="${(h - 8).toFixed(1)}" fill="#dce6ef" font-size="9" text-anchor="middle">Surface</text>`);
      }
      if (groups.length === 1) {
        drawNodeSliceLegend(svg, groups[0].layerPlan, w - margin.right + 18, margin.top + 10, {
          treadDepthMm: groups[0].treadDepthMm,
          nodeThicknessMm: groups[0].nodeThicknessMm,
          trueMaxDepthMm: trueMaxDepth
        }, nodeSectionVisibility());
      } else {
        drawNodeSectionGroupLegend(svg, groups, w - margin.right + 16, margin.top + 10, h - margin.bottom);
      }
    }

    function selectedNodeIndexOrDefault(points) {
      return selectedNodeIndicesOrDefault(points)[0] ?? NaN;
    }

    function selectedNodeIndicesOrDefault(points) {
      const nodes = points.map(point => Number(point.nodeIndex)).filter(Number.isFinite);
      if (!nodes.length) return [];
      const selected = (viewState.selectedNodeIndices || [])
        .map(Number)
        .filter(node => nodes.includes(node));
      if (!selected.length) selected.push(nodes[0]);
      selected.sort((a, b) => a - b);
      const activeNode = Number(viewState.selectedNodeIndex);
      viewState.selectedNodeIndices = selected;
      viewState.selectedNodeIndex = selected.includes(activeNode) ? activeNode : selected[0];
      return selected;
    }

    function selectedNodeSet(points) {
      return new Set(selectedNodeIndicesOrDefault(points));
    }

    function selectedNodeLabel(nodes, maxItems = 5) {
      const values = Array.from(nodes || []).map(Number).filter(Number.isFinite).sort((a, b) => a - b);
      if (!values.length) return "Node";
      if (values.length === 1) return `Node ${values[0]}`;
      const shown = values.slice(0, maxItems).join(", ");
      const suffix = values.length > maxItems ? ` +${values.length - maxItems}` : "";
      return `Nodes ${shown}${suffix}`;
    }

    function buildNodeSectionGroups(nodeIndices, rubber, layers) {
      const referenceGapMm = layerReferenceGapMm(layers);
      const spreadStrength = nodeLayerSpreadStrength();
      const visibility = nodeSectionVisibility();
      const byKey = new Map();
      nodeIndices.forEach(nodeIndex => {
        const rubberRow = rubber.find(row => sameNode(row.nodeIndex, nodeIndex));
        if (!rubberRow) return;
        const nodeLayers = layers.filter(row => sameNode(row.nodeIndex, nodeIndex));
        const treadDepthMm = Math.max(0, Number(rubberRow.treadDepthM) * 1000 || 0);
        const nodeThicknessMm = Math.max(treadDepthMm, Number(rubberRow.nodeThicknessM) * 1000 || 0);
        const restPlan = buildNodeRestSpreadPlan(treadDepthMm, nodeThicknessMm, spreadStrength, NODE_REST_SPREAD_TARGET_MM);
        let layerPlan = buildNodeLayerSpreadPlan(nodeLayers, nodeThicknessMm, referenceGapMm, spreadStrength, NODE_LAYER_SPREAD_TARGET_MM);
        layerPlan = shiftNodeLayerPlan(layerPlan, restPlan.nodeExtraMm);
        const displayDepths = [1];
        if (visibility.rest) displayDepths.push(restPlan.displayNodeThicknessMm, restPlan.displayTreadDepthMm);
        if (visibility.layers) displayDepths.push(...layerPlan.map(item => item.displayOuter));
        const key = nodeSectionGroupKey(rubberRow, nodeLayers);
        if (!byKey.has(key)) {
          byKey.set(key, {
            key,
            nodes: [],
            treadDepthMm,
            nodeThicknessMm,
            displayTreadDepthMm: restPlan.displayTreadDepthMm,
            displayNodeThicknessMm: restPlan.displayNodeThicknessMm,
            layerPlan,
            trueMaxDepthMm: Math.max(1, nodeThicknessMm, treadDepthMm, ...layerPlan.map(item => item.outerOffset)),
            displayMaxDepthMm: Math.max(...displayDepths)
          });
        }
        byKey.get(key).nodes.push(Number(nodeIndex));
      });
      return Array.from(byKey.values()).map(group => ({
        ...group,
        nodes: group.nodes.sort((a, b) => a - b)
      })).sort((a, b) => a.nodes[0] - b.nodes[0]);
    }

    function nodeSectionLayoutMetrics(count, yStart, yEnd) {
      const n = Math.max(1, Number(count) || 1);
      const available = Math.max(1, yEnd - yStart);
      if (n <= 1) return { gap: 0, height: available };
      let gap = Math.min(7, Math.max(1, available / (n * 5)));
      let height = (available - gap * (n - 1)) / n;
      if (height < 1) {
        gap = Math.min(0.5, available / (n * 8));
        height = (available - gap * (n - 1)) / n;
      }
      return {
        gap: Math.max(0, gap),
        height: Math.max(0.35, height)
      };
    }

    function nodeSectionXScale(groups, visibility, margin, width) {
      const left = Number(margin.left);
      const right = Number(width) - Number(margin.right);
      const plotW = Math.max(1, right - left);
      const layerOnly = visibility.layers && !visibility.rest;
      if (!layerOnly) {
        const maxDepth = Math.max(1, ...groups.map(group => group.displayMaxDepthMm)) + 2;
        return { mode: "stack", left, right, plotW, maxDepth, packages: new Map(), referenceGroup: groups[0] || null };
      }

      const packages = new Map();
      let referenceGroup = groups[0] || null;
      let maxWidth = 0;
      groups.forEach(group => {
        const trueStarts = group.layerPlan.map(item => Number(item.innerOffset)).filter(Number.isFinite);
        const trueEnds = group.layerPlan.map(item => Number(item.outerOffset)).filter(Number.isFinite);
        const displayStarts = group.layerPlan.map(item => Number(item.displayInner)).filter(Number.isFinite);
        const displayEnds = group.layerPlan.map(item => Number(item.displayOuter)).filter(Number.isFinite);
        const trueStart = trueStarts.length ? Math.min(...trueStarts) : 0;
        const trueEnd = trueEnds.length ? Math.max(...trueEnds) : trueStart + 1;
        const displayStart = displayStarts.length ? Math.min(...displayStarts) : trueStart;
        const displayEnd = displayEnds.length ? Math.max(...displayEnds) : displayStart + 1;
        const trueWidth = Math.max(1e-6, trueEnd - trueStart);
        const displayWidth = Math.max(1e-6, displayEnd - displayStart);
        packages.set(group.key, { trueStart, trueEnd, trueWidth, displayStart, displayEnd, displayWidth });
        if (trueWidth > maxWidth) {
          maxWidth = trueWidth;
          referenceGroup = group;
        }
      });
      if (!(maxWidth > 0)) maxWidth = 1;
      return { mode: "layers-only", left, right, plotW, maxWidth, packages, referenceGroup };
    }

    function nodeSectionXAt(offsetMm, group, scale) {
      const offset = Number(offsetMm);
      if (scale.mode !== "layers-only") {
        return scale.left + clamp(offset, 0, scale.maxDepth) / scale.maxDepth * scale.plotW;
      }

      const packageInfo = scale.packages.get(group?.key) || scale.packages.get(scale.referenceGroup?.key);
      if (!packageInfo) return scale.right;
      const packagePx = packageInfo.trueWidth / scale.maxWidth * scale.plotW;
      const packageLeft = scale.right - packagePx;
      const fraction = (offset - packageInfo.displayStart) / packageInfo.displayWidth;
      return packageLeft + fraction * packagePx;
    }

    function nodeSectionGroupKey(rubberRow, nodeLayers) {
      const layersKey = nodeLayers.slice()
        .sort((a, b) => Number(a.plyIndex) - Number(b.plyIndex))
        .map(row => [
          numberKey(row.plyIndex),
          numberKey(row.angleDeg),
          numberKey(row.thicknessM),
          numberKey(row.connectFlag),
          numberKey(row.offsetM)
        ].join(":"))
        .join("|");
      return [
        `td=${numberKey(rubberRow.treadDepthM)}`,
        `nt=${numberKey(rubberRow.nodeThicknessM)}`,
        `layers=${layersKey}`
      ].join(";");
    }

    function drawNodeSectionGroupLegend(svg, groups, x, y, bottomY) {
      svg.insertAdjacentHTML("beforeend", `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" fill="#b9d8f2" font-size="10" font-weight="700">Groups</text>`);
      const available = Math.max(18, Number(bottomY) - y - 16);
      const rowStep = clamp(available / Math.max(groups.length, 1), 5.5, 14);
      const fontSize = rowStep < 7 ? 5.8 : rowStep < 9 ? 7 : 8.5;
      groups.forEach((group, index) => {
        const rowY = y + 16 + index * rowStep;
        svg.insertAdjacentHTML("beforeend", `<circle cx="${x.toFixed(1)}" cy="${(rowY - 2).toFixed(1)}" r="3.1" fill="#4fb3ff" stroke="#0b0f12" stroke-width="0.8"></circle>`);
        svg.insertAdjacentHTML("beforeend", `<text x="${(x + 9).toFixed(1)}" y="${(rowY + 1).toFixed(1)}" fill="#dceaf7" font-size="${fontSize}">${escapeHtml(selectedNodeLabel(group.nodes, 3))}</text>`);
        if (rowStep >= 8) {
          svg.insertAdjacentHTML("beforeend", `<text x="${(x + 118).toFixed(1)}" y="${(rowY + 1).toFixed(1)}" fill="#9aa7b3" font-size="${fontSize}" text-anchor="end">${escapeHtml(fmtMm(group.trueMaxDepthMm))}</text>`);
        }
      });
    }

    function drawNodeSectionHeaderLabels(svg, xAt, groups, y, scale = null) {
      const reference = scale?.referenceGroup || groups[0];
      if (!reference) return;
      const visibility = nodeSectionVisibility();
      const labels = [];
      if (visibility.rest) {
        labels.push({ x: (xAt(0, reference) + xAt(reference.displayTreadDepthMm, reference)) / 2, width: estimateNodeSliceLabelWidth("TD"), label: "TD", color: "#f0b85a" });
        labels.push({ x: (xAt(reference.displayTreadDepthMm, reference) + xAt(reference.displayNodeThicknessMm, reference)) / 2, width: estimateNodeSliceLabelWidth("NT"), label: "NT", color: "#78d3ff" });
      }
      if (visibility.layers) {
        reference.layerPlan.forEach(item => {
          const layer = Number(item.row.plyIndex || 1);
          labels.push({
            x: (xAt(item.displayInner, reference) + xAt(item.displayOuter, reference)) / 2,
            width: estimateNodeSliceLabelWidth(`L${layer}`),
            label: `L${layer}`,
            color: COLORS[(layer - 1) % COLORS.length]
          });
        });
      }
      drawNodeSliceLabels(svg, labels, y);
    }

    function drawNodeSliceBand(svg, xAt, yTop, yBottom, startMm, endMm, color, opacity, label, group = null) {
      const x1 = xAt(startMm, group);
      const x2 = xAt(endMm, group);
      const width = Math.max(1, x2 - x1);
      svg.insertAdjacentHTML("beforeend",
        `<rect x="${x1.toFixed(1)}" y="${yTop.toFixed(1)}" width="${width.toFixed(1)}" height="${(yBottom - yTop).toFixed(1)}" fill="${color}" fill-opacity="${opacity}" stroke="${color}" stroke-opacity="0.75" stroke-width="0.9"><title>${escapeHtml(label)}</title></rect>`);
      return {
        x: x1 + width / 2,
        width: estimateNodeSliceLabelWidth(label),
        label,
        color
      };
    }

    function drawNodeSliceLabels(svg, candidates, y) {
      chooseNodeSliceLabels(candidates).forEach(item => {
        svg.insertAdjacentHTML("beforeend", `<text x="${item.x.toFixed(1)}" y="${y.toFixed(1)}" fill="${item.color}" font-size="9" text-anchor="middle">${escapeHtml(item.label)}</text>`);
      });
    }

    function chooseNodeSliceLabels(candidates) {
      const ordered = candidates
        .filter(item => item && Number.isFinite(item.x) && Number.isFinite(item.width))
        .sort((a, b) => a.x - b.x);
      const groups = [];
      ordered.forEach(item => {
        const group = groups[groups.length - 1];
        if (!group?.length || textGapPx(group[group.length - 1], item) >= NODE_SLICE_LABEL_MIN_GAP_PX) {
          groups.push([item]);
        } else {
          group.push(item);
        }
      });

      return groups.flatMap(group => selectAlternatingNodeSliceLabels(group))
        .sort((a, b) => a.x - b.x);
    }

    function selectAlternatingNodeSliceLabels(group) {
      if (group.length <= 1) return group;
      const center = Math.floor((group.length - 1) / 2);
      const order = [];
      for (let step = 0; step <= group.length; step++) {
        const left = center - step;
        const right = center + step;
        if (left >= 0) order.push(left);
        if (right < group.length && right !== left) order.push(right);
      }

      const selected = [];
      order.forEach(index => {
        const candidate = group[index];
        if (selected.every(item => textGapPx(item, candidate) >= NODE_SLICE_LABEL_MIN_GAP_PX)) {
          selected.push(candidate);
        }
      });
      return selected.length ? selected : [group[center]];
    }

    function textGapPx(left, right) {
      const a = left.x <= right.x ? left : right;
      const b = left.x <= right.x ? right : left;
      return b.x - b.width / 2 - (a.x + a.width / 2);
    }

    function estimateNodeSliceLabelWidth(label) {
      return String(label ?? "").length * 5.4 + 1;
    }

    function drawNodeSliceLegend(svg, layerPlan, x, y, values, visibility = nodeSectionVisibility()) {
      svg.insertAdjacentHTML("beforeend", `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" fill="#b9d8f2" font-size="10" font-weight="700">Stack</text>`);
      const rows = visibility.rest ? [
        { label: "TD", color: "#f0b85a", valueMm: values.treadDepthMm },
        { label: "NT", color: "#78d3ff", valueMm: values.nodeThicknessMm }
      ] : [];
      rows.forEach((row, index) => {
        const rowY = y + 18 + index * 15;
        drawNodeSliceLegendRow(svg, x, rowY, row.color, row.label, row.valueMm);
      });

      let layerTitleY = y + 18 + rows.length * 15 + (rows.length ? 25 : 10);
      if (visibility.layers) {
        svg.insertAdjacentHTML("beforeend", `<text x="${x.toFixed(1)}" y="${layerTitleY.toFixed(1)}" fill="#b9d8f2" font-size="10" font-weight="700">Layers</text>`);
        if (!layerPlan.length) {
          svg.insertAdjacentHTML("beforeend", `<text x="${x.toFixed(1)}" y="${(layerTitleY + 18).toFixed(1)}" fill="#9aa7b3" font-size="10">-</text>`);
        }
        layerPlan.forEach((item, index) => {
          const layer = Number(item.row.plyIndex || 1);
          const color = COLORS[(layer - 1) % COLORS.length];
          const rowY = layerTitleY + 18 + index * 15;
          drawNodeSliceLegendRow(svg, x, rowY, color, `L${layer}`, layerThicknessMm(item.row));
        });
      } else if (!visibility.rest) {
        svg.insertAdjacentHTML("beforeend", `<text x="${x.toFixed(1)}" y="${(y + 18).toFixed(1)}" fill="#9aa7b3" font-size="10">hidden</text>`);
        layerTitleY = y + 18;
      }

      const totalY = layerTitleY + 24 + (visibility.layers ? Math.max(layerPlan.length, 1) * 15 : 0);
      svg.insertAdjacentHTML("beforeend", `<text x="${x.toFixed(1)}" y="${totalY.toFixed(1)}" fill="#9aa7b3" font-size="9">true stack ${escapeHtml(fmtMm(values.trueMaxDepthMm))}</text>`);
    }

    function drawNodeSliceLegendRow(svg, x, y, color, label, valueMm) {
      svg.insertAdjacentHTML("beforeend", `<line x1="${x.toFixed(1)}" y1="${y.toFixed(1)}" x2="${(x + 15).toFixed(1)}" y2="${y.toFixed(1)}" stroke="${color}" stroke-width="3"/>`);
      svg.insertAdjacentHTML("beforeend", `<text x="${(x + 22).toFixed(1)}" y="${(y + 3).toFixed(1)}" fill="#dceaf7" font-size="10">${escapeHtml(label)}</text>`);
      svg.insertAdjacentHTML("beforeend", `<text x="${(x + 140).toFixed(1)}" y="${(y + 3).toFixed(1)}" fill="#b9d8f2" font-size="10" text-anchor="end">${escapeHtml(fmtMm(valueMm))}</text>`);
    }

    function drawMaterialTeardown() {
      const title = document.getElementById("node-material-title");
      const note = document.getElementById("node-material-note");
      const summary = document.getElementById("node-material-summary");
      const recognition = document.getElementById("node-material-recognition");
      const charts = {
        young: document.getElementById("material-young-chart"),
        density: document.getElementById("material-density-chart"),
        heat: document.getElementById("material-heat-chart"),
        conductivity: document.getElementById("material-conductivity-chart"),
        dimensionless: document.getElementById("material-dimensionless-chart")
      };
      if (!title || !summary) return;

      const data = state?.plotData || {};
      const geometry = data.geometry || [];
      if (!geometry.length) {
        title.textContent = "Material teardown";
        if (note) note.textContent = "";
        summary.innerHTML = "";
        if (recognition) recognition.innerHTML = "";
        Object.values(charts).forEach(svg => drawMaterialEmptyChart(svg, "Material data", "No tyre loaded"));
        return;
      }

      const points = geometry.map(point => ({ ...point, xMm: Number(point.x) * 1000, yMm: Number(point.y) * 1000 }));
      const selectedNodes = selectedNodeIndicesOrDefault(points);
      const rows = materialRowsForNodes(selectedNodes);
      title.textContent = `${selectedNodeLabel(selectedNodes)} material teardown`;
      const pressureFields = materialPressureFields(rows);
      if (note) {
        note.textContent = pressureFields.length
          ? `pressure fields: ${pressureFields.join(", ")}`
          : "no pressure-dependent material rows";
      }
      drawMaterialSummary(summary, rows);
      drawMaterialRecognition(recognition, selectedNodes);
      const filteredRows = filterMaterialRowsByKind(rows);

      drawMaterialTrendChart(charts.young, "Young's modulus", materialPropertySeries(filteredRows, "youngsModulusPa", value => value / 1e6, "MPa", selectedNodes), "MPa", "young");
      drawMaterialTrendChart(charts.density, "Density", materialPropertySeries(filteredRows, "densityKgM3", value => value, "kg/m3", selectedNodes), "kg/m3", "density");
      drawMaterialTrendChart(charts.heat, "Specific heat", materialPropertySeries(filteredRows, "specificHeatJKgK", value => value, "J/kgK", selectedNodes), "J/kgK", "heat");
      drawMaterialTrendChart(charts.conductivity, "Conductivity", materialPropertySeries(filteredRows, "conductivityWMK", value => value, "W/mK", selectedNodes), "W/mK", "conductivity");
      drawMaterialTrendChart(charts.dimensionless, "Poisson / Compression", materialDimensionlessSeries(filteredRows, selectedNodes), "-", "dimensionless");
    }

    function toggleMaterialKindFilter(kind) {
      const key = String(kind || "");
      if (!key) return;
      if (materialKindFilters.has(key)) {
        materialKindFilters.delete(key);
      } else {
        materialKindFilters.add(key);
      }
    }

    function filterMaterialRowsByKind(rows) {
      return sortMaterialRows((rows || []).filter(row => materialKindFilters.has(String(row.kind || ""))));
    }

    function toggleMaterialSeries(chartKey, seriesKey) {
      const key = materialSeriesVisibilityKey(chartKey, seriesKey);
      if (!key) return;
      if (materialHiddenSeries.has(key)) {
        materialHiddenSeries.delete(key);
      } else {
        materialHiddenSeries.add(key);
      }
      if (viewState.currentView === "materials") {
        drawMaterialsPage();
      } else {
        drawMaterialTeardown();
      }
    }

    function materialSeriesVisibilityKey(chartKey, seriesKey) {
      return chartKey && seriesKey ? `${chartKey}:${seriesKey}` : "";
    }

    function isMaterialSeriesHidden(chartKey, seriesKey) {
