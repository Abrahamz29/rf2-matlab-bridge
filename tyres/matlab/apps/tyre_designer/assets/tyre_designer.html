    function calloutLabelBox(frame, rubber, callouts) {
      const inner = rubber.filter(row => Number.isFinite(row.innerXMm) && Number.isFinite(row.innerYMm));
      const labelWidth = Math.max(112, ...callouts.map(item => item.label.length * 7 + 18));
      const plotLeft = frame.margin.left;
      const plotRight = frame.w - frame.margin.right;
      const plotTop = frame.margin.top;
      const plotBottom = frame.h - frame.margin.bottom;
      const labelStep = 17;
      const stackHalf = (callouts.length - 1) * labelStep / 2;

      const innerXs = inner.map(row => frame.sx(row.innerXMm));
      const centerX = innerXs.length
        ? (Math.min(...innerXs) + Math.max(...innerXs)) / 2
        : (plotLeft + plotRight) / 2;
      const treadInnerY = treadInnerReferenceY(frame, inner);
      const centerY = Number.isFinite(treadInnerY)
        ? (plotTop + treadInnerY) / 2
        : (plotTop + plotBottom) / 2;
      const labelX = clamp(centerX - labelWidth / 2 - 38, plotLeft + 12, plotRight - labelWidth - 12);
      const obstacleY = nearestLabelObstacleY(frame, labelX, labelWidth, callouts);
      const maxCenterY = Number.isFinite(obstacleY)
        ? Math.min(plotBottom - 18 - stackHalf, obstacleY - 18 - stackHalf)
        : plotBottom - 18 - stackHalf;
      const minCenterY = plotTop + 54 + stackHalf;

      return {
        x: labelX,
        width: labelWidth,
        centerY: clamp(centerY, minCenterY, maxCenterY)
      };
    }

    function nearestLabelObstacleY(frame, labelX, labelWidth, specs) {
      const left = labelX - 10;
      const right = labelX + labelWidth + 10;
      const ys = [];
      specs.forEach(spec => {
        (spec.candidates || []).forEach(point => {
          const x = frame.sx(point.x);
          const y = frame.sy(point.y);
          if (Number.isFinite(x) && Number.isFinite(y) && x >= left && x <= right) ys.push(y);
        });
      });
      return ys.length ? Math.min(...ys) : NaN;
    }

    function treadInnerReferenceY(frame, innerRows) {
      const values = innerRows
        .map(row => frame.sy(row.innerYMm))
        .filter(Number.isFinite)
        .sort((a, b) => a - b);
      if (!values.length) return NaN;

      const index = Math.min(values.length - 1, Math.max(0, Math.floor(values.length * 0.75)));
      return values[index];
    }

    function layoutCallouts(frame, callouts, centerY) {
      const labelStep = 17;
      const top = frame.margin.top + 42;
      const bottom = frame.h - frame.margin.bottom - 12;
      const ordered = callouts.map((item, index) => ({
        ...item,
        anchorY: frame.sy(item.y),
        originalIndex: index
      }));

      ordered.forEach((item, index) => {
        item.labelY = centerY - (ordered.length - 1) * labelStep / 2 + index * labelStep;
        if (index > 0) item.labelY = Math.max(item.labelY, ordered[index - 1].labelY + labelStep);
      });

      const overflow = ordered.length ? ordered[ordered.length - 1].labelY - bottom : 0;
      if (overflow > 0) {
        for (let index = ordered.length - 1; index >= 0; index--) {
          const maxY = index === ordered.length - 1 ? bottom : ordered[index + 1].labelY - labelStep;
          ordered[index].labelY = Math.min(ordered[index].labelY - overflow, maxY);
        }
      }

      ordered.forEach((item, index) => {
        const minY = index === 0 ? top : ordered[index - 1].labelY + labelStep;
        item.labelY = Math.max(item.labelY, minY);
      });
      return ordered;
    }

    function pickCalloutAnchor(rubber, layers) {
      const layerNodes = new Set(layers.map(row => Number(row.nodeIndex)).filter(Number.isFinite));
      const valid = rubber.filter(row => Number.isFinite(row.surfaceXMm) && Number.isFinite(row.surfaceYMm));
      const candidates = valid.filter(row => row.surfaceXMm >= 0 && (!layerNodes.size || layerNodes.has(Number(row.nodeIndex))));
      const pool = candidates.length ? candidates : valid;
      if (!pool.length) return null;
      return pool.reduce((best, row) => row.surfaceXMm > best.surfaceXMm ? row : best, pool[0]);
    }

    function nearestLayerRow(rows, layer, nodeIndex) {
      const subset = rows.filter(row => Number(row.plyIndex) === layer && Number.isFinite(row.xMm) && Number.isFinite(row.yMm));
      if (!subset.length) return null;
      return subset.reduce((best, row) => {
        const distance = Math.abs(Number(row.nodeIndex) - nodeIndex);
        const bestDistance = Math.abs(Number(best.nodeIndex) - nodeIndex);
        return distance < bestDistance ? row : best;
      }, subset[0]);
    }

    function drawCallout(svg, frame, item, labelX, labelY, sharedWidth) {
      const anchorX = frame.sx(item.x);
      const anchorY = frame.sy(item.y);
      const labelWidth = sharedWidth || Math.max(112, item.label.length * 7 + 18);
      const labelHeight = 15;
      const labelRight = labelX + labelWidth;
      const labelMidX = labelX + labelWidth / 2;
      const lineEndX = anchorX >= labelMidX ? labelRight + 4 : labelX - 4;
      const opacity = focusOpacity(item.focusKey, 0.34);
      const rectFill = viewState.focusKey === item.focusKey ? "#101923" : "#0b0f12";
      svg.insertAdjacentHTML("beforeend", `
        <g class="callout" data-focus-key="${escapeAttr(item.focusKey)}" opacity="${opacity.toFixed(2)}">
          <line x1="${lineEndX.toFixed(1)}" y1="${labelY.toFixed(1)}" x2="${anchorX.toFixed(1)}" y2="${anchorY.toFixed(1)}" stroke="${item.color}" stroke-opacity="0.78" stroke-width="1"></line>
          <circle cx="${anchorX.toFixed(1)}" cy="${anchorY.toFixed(1)}" r="2.2" fill="${item.color}" stroke="#0b0f12" stroke-width="0.8"></circle>
          <rect x="${labelX.toFixed(1)}" y="${(labelY - 11).toFixed(1)}" width="${labelWidth.toFixed(1)}" height="${labelHeight}" rx="3" fill="${rectFill}" fill-opacity="0.92" stroke="${item.color}" stroke-opacity="0.5"></rect>
          <text x="${(labelX + 7).toFixed(1)}" y="${(labelY + 0.5).toFixed(1)}">${escapeHtml(item.label)}</text>
        </g>`);
    }

    function splitSegments(rows) {
      const segments = [];
      let current = [], prevNode = NaN, prevSegment = NaN;
      rows.forEach(row => {
        const node = Number(row.nodeIndex);
        const segment = Number(row.segmentIndex);
        const gap = Number.isFinite(prevNode) && node > prevNode + 1;
        const changed = Number.isFinite(prevSegment) && Number.isFinite(segment) && segment !== prevSegment;
        if (current.length && (gap || changed)) {
          segments.push(current);
          current = [];
        }
        current.push(row);
        prevNode = node;
        prevSegment = segment;
      });
      if (current.length) segments.push(current);
      return segments;
    }

    function pointPath(rows, frame, xKey, yKey) {
      return rows.filter(row => Number.isFinite(Number(row[xKey])) && Number.isFinite(Number(row[yKey])))
        .map((row, index) => `${index ? "L" : "M"}${frame.sx(Number(row[xKey])).toFixed(1)},${frame.sy(Number(row[yKey])).toFixed(1)}`)
        .join(" ");
    }

    function bandPath(rows, frame, innerXKey, innerYKey, outerXKey, outerYKey) {
      const first = pointPath(rows, frame, innerXKey, innerYKey);
      const second = rows.slice().reverse()
        .filter(row => Number.isFinite(Number(row[outerXKey])) && Number.isFinite(Number(row[outerYKey])))
        .map(row => `L${frame.sx(Number(row[outerXKey])).toFixed(1)},${frame.sy(Number(row[outerYKey])).toFixed(1)}`)
        .join(" ");
      return `${first} ${second} Z`;
    }

    function drawLegend(svg, items) {
      items.forEach((item, index) => {
        const x = 118 + index * 132;
        svg.insertAdjacentHTML("beforeend", `<g class="legend"><line x1="${x}" y1="20" x2="${x + 18}" y2="20" stroke="${item.color}" stroke-width="2"></line><text x="${x + 24}" y="24">${escapeHtml(item.label)}</text></g>`);
      });
    }

    function niceTicks(min, max, count) {
      const span = safeRange(min, max);
      const rawStep = span / Math.max(count - 1, 1);
      const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const residual = rawStep / magnitude;
      const niceResidual = residual >= 5 ? 5 : residual >= 2 ? 2 : 1;
      const step = niceResidual * magnitude;
      const start = Math.ceil(min / step) * step;
      const ticks = [];
      for (let value = start; value <= max + step * 0.5; value += step) ticks.push(Number(value.toPrecision(12)));
      return ticks.length ? ticks : [min, max];
    }

    function tickFormat(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (Math.abs(n) >= 10000 || (Math.abs(n) > 0 && Math.abs(n) < 0.001)) return n.toExponential(1);
      return n.toFixed(Math.abs(n) >= 10 ? 1 : 3).replace(/\.?0+$/, "");
    }

    function safeRange(min, max) {
      const range = max - min;
      return Number.isFinite(range) && Math.abs(range) > 1e-12 ? range : 1;
    }

    function clamp(value, min, max) {
      if (max < min) return min;
      return Math.min(Math.max(value, min), max);
    }

    function fmt(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return n.toFixed(Math.abs(n) >= 10 ? 2 : 3).replace(/\.?0+$/, "");
    }

    function fmtMm(value) {
      const n = Number(value);
      return Number.isFinite(n) ? `${fmt(n)} mm` : "-";
    }

    function setMessage(message) {
      document.getElementById("message").textContent = message || "";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
